<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DC Circuits — 3D</title>
<link rel="stylesheet" href="../sim.css">
</head>
<body>
<canvas id="sim"></canvas>
<script src="../lib/ui.js"></script>
<script src="../lib/engine3d.js"></script>
<script>
'use strict';
const INK = '#1a1a2e', WIRE = '#334155', CUR = '#d97706', ELEC = '#eab308';
const POS = '#e63946', NEG = '#2563eb';

const S = {
  preset: 'loop',
  V: 6, R1: 6, R2: 12, R3: 12,
  switchClosed: true,
  electrons: true,
  convArrows: true,
  potential: false,
  meters: true,
  grid: true,
  oldResistorSymbol: false
};

const ui = SimUI({ back: '../index.html', title: 'DC Circuits in 3D', subtitle: 'Electron flow, series & parallel — drag to orbit, scroll to zoom' });

const gp = ui.group('Circuit');
ui.segment(gp, null, [
  { value: 'loop', label: 'Bulb + switch' },
  { value: 'series', label: 'Series' },
  { value: 'parallel', label: 'Parallel' },
  { value: 'combo', label: 'Series + parallel' }
], 'loop', v => { S.preset = v; });
ui.buttons(gp, [{ label: '⏻ Open / close switch', onClick: () => { S.switchClosed = !S.switchClosed; } }]);

const gv = ui.group('Values');
ui.slider(gv, 'Battery voltage', { min: 1.5, max: 12, step: 0.5, value: 6, fmt: v => v + ' V' }, v => S.V = v);
ui.slider(gv, 'R1 (Ω)', { min: 2, max: 24, step: 1, value: 6, fmt: v => v + ' Ω' }, v => S.R1 = v);
ui.slider(gv, 'R2 (Ω)', { min: 2, max: 24, step: 1, value: 12, fmt: v => v + ' Ω' }, v => S.R2 = v);
ui.slider(gv, 'R3 (Ω)', { min: 2, max: 24, step: 1, value: 12, fmt: v => v + ' Ω' }, v => S.R3 = v);

const gs = ui.group('Show / hide');
ui.toggle(gs, 'Electron flow', true, v => S.electrons = v, { swatch: ELEC });
ui.toggle(gs, 'Conventional current', true, v => S.convArrows = v, { swatch: CUR });
ui.toggle(gs, 'Potential colours (V)', false, v => S.potential = v, { swatch: 'linear-gradient(90deg,#e63946,#2563eb)' });
ui.toggle(gs, 'Meter readings', true, v => S.meters = v);
ui.toggle(gs, 'Bench grid', true, v => S.grid = v);
ui.toggle(gs, 'Old resistor symbol (zigzag)', false, v => S.oldResistorSymbol = v);

const gr = ui.group('Readings');
const roR = ui.readout(gr, 'Total resistance', '');
const roI = ui.readout(gr, 'Total current', '');
const roP = ui.readout(gr, 'Total power', '');

const foot = ui.footer('');
ui.hint('Drag to rotate · shift+drag to pan · scroll / pinch to zoom');

const { canvas, ctx, W, H } = SimCanvas();
const eng = Engine3D(canvas, { dist: 13, yaw: 0.45, pitch: 0.75 });

/* ---------- path helpers ---------- */
function pathLen(pts) {
  let L = 0;
  for (let i = 1; i < pts.length; i++) L += v3.len(v3.sub(pts[i], pts[i - 1]));
  return L;
}
function pathPoint(pts, s) {
  for (let i = 1; i < pts.length; i++) {
    const d = v3.len(v3.sub(pts[i], pts[i - 1]));
    if (s <= d) return { p: v3.lerp(pts[i - 1], pts[i], s / d), dir: v3.norm(v3.sub(pts[i], pts[i - 1])) };
    s -= d;
  }
  const n = pts.length;
  return { p: pts[n - 1], dir: v3.norm(v3.sub(pts[n - 1], pts[n - 2])) };
}
function zigzag(a, b, zigs, amp) {
  // zigzag occupying the middle 55% of a→b, perpendicular offsets in the x-z plane
  const dir = v3.norm(v3.sub(b, a));
  const perp = v3.norm(v3.cross(dir, [0, 1, 0]));
  const L = v3.len(v3.sub(b, a));
  const s0 = L * 0.225, s1 = L * 0.775;
  const pts = [a, v3.add(a, v3.mul(dir, s0))];
  for (let i = 0; i < zigs; i++) {
    const t = s0 + (s1 - s0) * ((i + 0.5) / zigs);
    pts.push(v3.add(v3.add(a, v3.mul(dir, t)), v3.mul(perp, (i % 2 ? -1 : 1) * amp)));
  }
  pts.push(v3.add(a, v3.mul(dir, s1)), b);
  return pts;
}

/* ---------- circuit presets (runs listed in conventional-current direction) ---------- */
// corners of the loop, lying flat in the x-z plane
const TL = [-4, 0, -3], TR = [4, 0, -3], BR = [4, 0, 3], BL = [-4, 0, 3];
const BATT_A = [-4, 0, 0.9], BATT_B = [-4, 0, -0.9]; // − to + (current inside source)

function buildCircuit() {
  const sw = S.switchClosed ? 1 : 0;
  const V = S.V, R1 = S.R1, R2 = S.R2, R3 = S.R3;
  let runs = [], RT, I;

  if (S.preset === 'loop') {
    RT = R1;
    I = sw * V / RT;
    runs = [
      { kind: 'battery', pts: [BATT_A, BATT_B], I, V0: 0, V1: V },
      { kind: 'wire', pts: [BATT_B, TL, [-0.9, 0, -3]], I, V0: V, V1: V },
      { kind: 'bulb', pts: [[-0.9, 0, -3], [0.9, 0, -3]], I, V0: V, V1: V - I * R1, R: R1, label: 'Bulb' },
      { kind: 'wire', pts: [[0.9, 0, -3], TR, BR, [-0.4, 0, 3]], I, V0: V - I * R1, V1: V - I * R1 },
      { kind: 'switch', pts: [[-0.4, 0, 3], [-1.8, 0, 3]], I, V0: V - I * R1, V1: 0 },
      { kind: 'wire', pts: [[-1.8, 0, 3], BL, BATT_A], I, V0: 0, V1: 0 }
    ];
  } else if (S.preset === 'series') {
    RT = R1 + R2;
    I = V / RT;
    const Vm = V - I * R1;
    runs = [
      { kind: 'battery', pts: [BATT_A, BATT_B], I, V0: 0, V1: V },
      { kind: 'wire', pts: [BATT_B, TL, [-1.2, 0, -3]], I, V0: V, V1: V },
      { kind: 'resistor', pts: [[-1.2, 0, -3], [1.2, 0, -3]], I, V0: V, V1: Vm, R: R1, label: 'R1' },
      { kind: 'wire', pts: [[1.2, 0, -3], TR, BR, [1.2, 0, 3]], I, V0: Vm, V1: Vm },
      { kind: 'resistor', pts: [[1.2, 0, 3], [-1.2, 0, 3]], I, V0: Vm, V1: 0, R: R2, label: 'R2' },
      { kind: 'wire', pts: [[-1.2, 0, 3], BL, BATT_A], I, V0: 0, V1: 0 }
    ];
  } else if (S.preset === 'parallel') {
    RT = 1 / (1 / R1 + 1 / R2);
    I = V / RT;
    const I1 = V / R1, I2 = V / R2;
    const J1 = [0.4, 0, -3], J2 = [0.4, 0, 3];
    runs = [
      { kind: 'battery', pts: [BATT_A, BATT_B], I, V0: 0, V1: V },
      { kind: 'wire', pts: [BATT_B, TL, J1], I, V0: V, V1: V },
      { kind: 'resistor', pts: [J1, J2], I: I1, V0: V, V1: 0, R: R1, label: 'R1' },
      { kind: 'wire', pts: [J1, TR], I: I2, V0: V, V1: V },
      { kind: 'resistor', pts: [TR, BR], I: I2, V0: V, V1: 0, R: R2, label: 'R2' },
      { kind: 'wire', pts: [BR, J2], I: I2, V0: 0, V1: 0 },
      { kind: 'wire', pts: [J2, BL, BATT_A], I, V0: 0, V1: 0 }
    ];
  } else { // combo
    const Rp = 1 / (1 / R2 + 1 / R3);
    RT = R1 + Rp;
    I = V / RT;
    const Vm = V - I * R1;
    const I2 = Vm / R2, I3 = Vm / R3;
    const J1 = [0.8, 0, -3], J2 = [0.8, 0, 3];
    runs = [
      { kind: 'battery', pts: [BATT_A, BATT_B], I, V0: 0, V1: V },
      { kind: 'wire', pts: [BATT_B, TL, [-2.8, 0, -3]], I, V0: V, V1: V },
      { kind: 'resistor', pts: [[-2.8, 0, -3], [-0.4, 0, -3]], I, V0: V, V1: Vm, R: R1, label: 'R1' },
      { kind: 'wire', pts: [[-0.4, 0, -3], J1], I, V0: Vm, V1: Vm },
      { kind: 'resistor', pts: [J1, J2], I: I2, V0: Vm, V1: 0, R: R2, label: 'R2' },
      { kind: 'wire', pts: [J1, TR], I: I3, V0: Vm, V1: Vm },
      { kind: 'resistor', pts: [TR, BR], I: I3, V0: Vm, V1: 0, R: R3, label: 'R3' },
      { kind: 'wire', pts: [BR, J2], I: I3, V0: 0, V1: 0 },
      { kind: 'wire', pts: [J2, BL, BATT_A], I, V0: 0, V1: 0 }
    ];
  }
  return { runs, RT, I };
}

/* ---------- rendering ---------- */
function potColor(V) {
  const t = Math.max(0, Math.min(1, V / S.V));
  const a = _hex(NEG), b = _hex(POS);
  return _rgb(a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t);
}

function drawGrid() {
  const y = -0.18, ext = 7.5, step = 1.5;
  for (let x = -ext; x <= ext + 0.01; x += step)
    eng.line([[x, y, -6], [x, y, 6]], { color: '#e2e8f0', width: 1.5 });
  for (let z = -6; z <= 6 + 0.01; z += step)
    eng.line([[-ext, y, z], [ext, y, z]], { color: '#e2e8f0', width: 1.5 });
}

function wireColor(run, t) {
  if (!S.potential) return WIRE;
  return potColor(run.V0 + (run.V1 - run.V0) * (t === undefined ? 0.5 : t));
}

function drawBattery(run) {
  const a = run.pts[0], b = run.pts[1];
  const dir = v3.norm(v3.sub(b, a));
  const mid = v3.lerp(a, b, 0.5);
  const perp = v3.norm(v3.cross(dir, [0, 1, 0]));
  const pPlus = v3.add(mid, v3.mul(dir, 0.22));
  const pMinus = v3.sub(mid, v3.mul(dir, 0.22));
  // leads
  eng.line([a, pMinus], { color: S.potential ? potColor(run.V0) : WIRE, width: 6 });
  eng.line([pPlus, b], { color: S.potential ? potColor(run.V1) : WIRE, width: 6 });
  // plates: long (+) and short (−), drawn vertically
  eng.line([v3.add(pPlus, [0, 0.9, 0]), v3.add(pPlus, [0, -0.2, 0])], { color: POS, width: 7 });
  eng.line([v3.add(pMinus, [0, 0.55, 0]), v3.add(pMinus, [0, -0.2, 0])], { color: INK, width: 12 });
  eng.label(v3.add(pPlus, v3.add(v3.mul(dir, 0.55), [0, 1.15, 0])), '+', { color: POS, size: 26 });
  eng.label(v3.add(pMinus, v3.add(v3.mul(dir, -0.55), [0, 0.8, 0])), '−', { color: INK, size: 26 });
  if (S.meters) eng.label(v3.add(mid, [0, 1.7, 0]), S.V.toFixed(1) + ' V', { color: INK, size: 19 });
}

function drawSwitch(run) {
  const a = run.pts[0], b = run.pts[1];
  const dir = v3.norm(v3.sub(b, a));
  const p1 = v3.lerp(a, b, 0.28), p2 = v3.lerp(a, b, 0.72);
  eng.line([a, p1], { color: wireColor(run, 0), width: 6 });
  eng.line([p2, b], { color: wireColor(run, 1), width: 6 });
  eng.sphere(p1, 0.12, INK);
  eng.sphere(p2, 0.12, INK);
  const gap = v3.len(v3.sub(p2, p1));
  const lever = S.switchClosed
    ? p2
    : v3.add(p1, v3.add(v3.mul(dir, gap * 0.6), [0, gap * 0.75, 0]));
  eng.line([p1, lever], { color: INK, width: 7 });
  if (S.meters) eng.label(v3.add(v3.lerp(p1, p2, 0.5), [0, 0.9, 0]), S.switchClosed ? 'switch (closed)' : 'switch (OPEN)', { color: S.switchClosed ? '#16a34a' : POS, size: 16 });
}

function drawResistorZigzag(run) {
  const a = run.pts[0], b = run.pts[1];
  const zz = zigzag(a, b, 7, 0.32);
  if (S.potential) {
    // colour each zig segment by interpolated potential
    const L = pathLen(zz);
    let s = 0;
    for (let i = 1; i < zz.length; i++) {
      const d = v3.len(v3.sub(zz[i], zz[i - 1]));
      const t = (s + d / 2) / L;
      eng.line([zz[i - 1], zz[i]], { color: potColor(run.V0 + (run.V1 - run.V0) * t), width: 5 });
      s += d;
    }
  } else {
    eng.line(zz, { color: INK, width: 5 });
  }
}

/* newer IEC-style symbol: a plain rectangle instead of a zigzag */
function drawResistorRect(run) {
  const a = run.pts[0], b = run.pts[1];
  const dir = v3.norm(v3.sub(b, a));
  const perp = v3.norm(v3.cross(dir, [0, 1, 0]));
  const L = v3.len(v3.sub(b, a));
  const s0 = L * 0.225, s1 = L * 0.775;
  const leadStart = v3.add(a, v3.mul(dir, s0));
  const leadEnd = v3.add(a, v3.mul(dir, s1));
  const amp = 0.34;
  const p1 = v3.add(leadStart, v3.mul(perp, amp));
  const p2 = v3.add(leadStart, v3.mul(perp, -amp));
  const p3 = v3.add(leadEnd, v3.mul(perp, -amp));
  const p4 = v3.add(leadEnd, v3.mul(perp, amp));

  eng.line([a, leadStart], { color: wireColor(run, 0), width: 5 });
  eng.line([leadEnd, b], { color: wireColor(run, 1), width: 5 });
  const fill = S.potential ? potColor((run.V0 + run.V1) / 2) : '#f8fafc';
  eng.poly([p1, p2, p3, p4], fill, { stroke: INK, strokeWidth: 3 });
}

function drawResistor(run) {
  if (S.oldResistorSymbol) drawResistorZigzag(run); else drawResistorRect(run);
  if (S.meters) {
    const mid = v3.lerp(run.pts[0], run.pts[1], 0.5);
    const drop = Math.abs(run.V0 - run.V1);
    eng.label(v3.add(mid, [0, 1.25, 0]), run.label + ' = ' + run.R + ' Ω', { color: INK, size: 18 });
    eng.label(v3.add(mid, [0, 0.72, 0]), run.I.toFixed(2) + ' A · ' + drop.toFixed(1) + ' V', { color: '#64748b', size: 15 });
  }
}

function drawBulb(run) {
  const a = run.pts[0], b = run.pts[1];
  const mid = v3.lerp(a, b, 0.5);
  const P = run.I * run.I * run.R;
  const bright = Math.min(1, P / 12);
  eng.line([a, v3.lerp(a, b, 0.3)], { color: wireColor(run, 0), width: 6 });
  eng.line([v3.lerp(a, b, 0.7), b], { color: wireColor(run, 1), width: 6 });
  // glow halo (drawn behind the glass)
  if (bright > 0.02) {
    for (const [r, al] of [[1.5, 0.10], [1.1, 0.16], [0.85, 0.25]])
      eng.sphere(mid, r * (0.6 + bright * 0.5), 'rgba(250,204,21,' + (al * bright).toFixed(3) + ')', { highlight: 'rgba(250,204,21,0)' });
  }
  const glass = bright > 0.02 ? lighten('#facc15', 0.75 - bright * 0.45) : '#eef2f7';
  eng.sphere(mid, 0.55, glass, { stroke: INK, strokeWidth: 2.5 });
  if (S.meters) {
    eng.label(v3.add(mid, [0, 1.35, 0]), 'bulb ' + run.R + ' Ω', { color: INK, size: 17 });
    eng.label(v3.add(mid, [0, 0.85, 0]), 'P = ' + P.toFixed(1) + ' W', { color: '#64748b', size: 15 });
  }
}

let lastT = 0;

function drawRun(run) {
  if (run.kind === 'battery') drawBattery(run);
  else if (run.kind === 'switch') drawSwitch(run);
  else if (run.kind === 'resistor') drawResistor(run);
  else if (run.kind === 'bulb') drawBulb(run);
  else {
    if (S.potential) {
      eng.line(run.pts, { color: potColor(run.V0), width: 6 });
    } else {
      eng.line(run.pts, { color: WIRE, width: 6 });
    }
  }
  // conventional current arrowheads (amber), on wires only
  if (S.convArrows && run.I > 0.005 && run.kind === 'wire') {
    const L = pathLen(run.pts);
    const q = pathPoint(run.pts, L * 0.5);
    eng.arrow(v3.add(q.p, v3.mul(q.dir, -0.55)), v3.add(q.p, v3.mul(q.dir, 0.55)), { color: CUR, width: 9 });
  }
}

/* ---------- electrons: particles that walk the whole circuit graph ----------
   Each run is one edge; electron-flow direction is the reverse of run.pts
   (electrons drift opposite conventional current). Particles persist across
   frames and carry over from edge to edge, so at a fork (a node feeding 2+
   outgoing edges) each arriving particle commits to ONE branch — never both,
   never vanishing — chosen by a weighted round-robin so the split matches the
   branches' current ratio (equal branches alternate 1-2-1-2). */
const nodeKey = p => p.map(x => Math.round(x * 100)).join(',');

function buildFlowGraph(runs) {
  const edges = runs.map((r, i) => {
    const pts = r.pts.slice().reverse();
    return { key: i, pts, L: pathLen(pts), I: r.I, fromKey: nodeKey(pts[0]), toKey: nodeKey(pts[pts.length - 1]) };
  });
  const outFrom = new Map();
  edges.forEach(e => {
    if (!outFrom.has(e.fromKey)) outFrom.set(e.fromKey, []);
    outFrom.get(e.fromKey).push(e);
  });
  return { edges, outFrom };
}

let particles = [], flowPreset = null;
const branchAcc = new Map(); // nodeKey -> Map(edgeKey -> weighted-round-robin accumulator)

function pickBranch(nodeK, candidates) {
  let acc = branchAcc.get(nodeK);
  if (!acc) { acc = new Map(); branchAcc.set(nodeK, acc); }
  const total = candidates.reduce((s, e) => s + Math.max(e.I, 1e-6), 0);
  let best = candidates[0], bestScore = -Infinity;
  for (const e of candidates) {
    const v = (acc.get(e.key) || 0) + Math.max(e.I, 1e-6) / total;
    acc.set(e.key, v);
    if (v > bestScore) { bestScore = v; best = e; }
  }
  acc.set(best.key, acc.get(best.key) - 1);
  return best;
}

function initParticles(edges) {
  particles = [];
  const spacing = 0.62;
  edges.forEach(e => {
    const n = Math.floor(e.L / spacing);
    for (let i = 0; i < n; i++) particles.push({ edgeIdx: e.key, s: i * spacing });
  });
  branchAcc.clear();
}

function stepParticles(edges, outFrom, dt) {
  for (const p of particles) {
    let e = edges[p.edgeIdx];
    p.s += dt * Math.min(e.I, 2.5) * 0.9;
    let guard = 0;
    while (p.s >= e.L && guard++ < 5) {
      p.s -= e.L;
      const candidates = outFrom.get(e.toKey);
      if (!candidates || !candidates.length) { p.s = 0; break; }
      const next = candidates.length === 1 ? candidates[0] : pickBranch(e.toKey, candidates);
      p.edgeIdx = next.key;
      e = edges[p.edgeIdx];
    }
  }
}

function drawElectrons(edges) {
  for (const p of particles) {
    const e = edges[p.edgeIdx];
    if (e.I <= 0.005) continue;
    const q = pathPoint(e.pts, p.s);
    eng.sphere(v3.add(q.p, [0, 0.02, 0]), 0.1, ELEC);
  }
}

function fmt(x, unit) { return (Math.round(x * 100) / 100) + ' ' + unit; }

function frame(tms) {
  const t = tms / 1000;
  const dt = Math.min(t - lastT, 0.05);
  lastT = t;

  ctx.clearRect(0, 0, W(), H());
  eng.begin(W(), H());
  if (S.grid) drawGrid();
  const { runs, RT, I } = buildCircuit();
  runs.forEach(r => drawRun(r));

  const { edges, outFrom } = buildFlowGraph(runs);
  if (S.preset !== flowPreset) { initParticles(edges); flowPreset = S.preset; }
  if (S.electrons) {
    stepParticles(edges, outFrom, dt);
    drawElectrons(edges);
  }
  eng.flush(ctx);

  roR.set(fmt(RT, 'Ω'));
  roI.set(fmt(I, 'A'));
  roP.set(fmt(S.V * I, 'W'));

  const V = S.V, R1 = S.R1, R2 = S.R2, R3 = S.R3;
  if (S.preset === 'loop') {
    foot.set('V = I R &nbsp;→&nbsp; I = V / R = ' + V + ' / ' + R1 + ' = <b>' + (S.switchClosed ? (V / R1).toFixed(2) : '0 (switch open)') + ' A</b>' +
      '<div class="small">A circuit needs a power source, conductors, and a complete (closed) loop</div>');
  } else if (S.preset === 'series') {
    foot.set('Series: R<sub>T</sub> = R1 + R2 = ' + (R1 + R2) + ' Ω &nbsp;·&nbsp; same I everywhere &nbsp;·&nbsp; voltages share: ' +
      (V - I * R2 >= 0 ? '' : '') + 'V1 + V2 = ' + (I * R1).toFixed(1) + ' + ' + (I * R2).toFixed(1) + ' = ' + V + ' V');
  } else if (S.preset === 'parallel') {
    foot.set('Parallel: 1/R<sub>T</sub> = 1/R1 + 1/R2 → R<sub>T</sub> = ' + RT.toFixed(1) + ' Ω &nbsp;·&nbsp; same V across branches &nbsp;·&nbsp; currents share: ' +
      (V / R1).toFixed(2) + ' + ' + (V / R2).toFixed(2) + ' = ' + I.toFixed(2) + ' A');
  } else {
    const Rp = 1 / (1 / R2 + 1 / R3);
    foot.set('R<sub>T</sub> = R1 + (R2 ∥ R3) = ' + R1 + ' + ' + Rp.toFixed(1) + ' = ' + RT.toFixed(1) + ' Ω &nbsp;·&nbsp; I<sub>T</sub> = ' + I.toFixed(2) + ' A splits between R2 and R3');
  }

  requestAnimationFrame(frame);
}
window.BOOT_DONE = true;
requestAnimationFrame(frame);
</script>
</body>
</html>
