<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Combustion — 3D</title>
<link rel="stylesheet" href="../sim.css">
</head>
<body>
<canvas id="sim"></canvas>
<script src="../lib/ui.js"></script>
<script src="../lib/engine3d.js"></script>
<script>
'use strict';
const INK = '#1a1a2e';

/* horizontal unit vector perpendicular to the camera direction (inlined
   from lib/vessel.js — this page doesn't load vessel.js) */
function sideVec(eng) {
  return [-Math.cos(eng.cam.yaw), 0, Math.sin(eng.cam.yaw)];
}

const FUELS = {
  methane: { name: 'methane', symbol: 'CH₄ + 2O₂ → CO₂ + 2H₂O' },
  butane: { name: 'butane', symbol: '2C₄H₁₀ + 13O₂ → 8CO₂ + 10H₂O' },
  octane: { name: 'octane', symbol: '2C₈H₁₈ + 25O₂ → 16CO₂ + 18H₂O' },
  wax: { name: 'candle wax', symbol: null }
};

const S = {
  fuel: 'methane', air: 80,
  showMolecules: true, showSoot: true, labels: true, showEnergyBar: true
};

const ui = SimUI({ back: '../index.html', title: 'Combustion', subtitle: 'Complete vs incomplete combustion — drag to orbit, scroll to zoom' });

const gf = ui.group('Fuel');
ui.segment(gf, null, [
  { value: 'methane', label: 'Methane (CH₄)' },
  { value: 'butane', label: 'Butane (C₄H₁₀)' },
  { value: 'octane', label: 'Octane (C₈H₁₈)' },
  { value: 'wax', label: 'Candle wax' }
], 'methane', v => S.fuel = v);

const ga = ui.group('Air / oxygen supply');
ui.slider(ga, 'Bunsen collar', { min: 0, max: 100, step: 1, value: 80, fmt: v => Math.round(v) + '%' }, v => S.air = v);

const gv = ui.group('Show / hide');
ui.toggle(gv, 'Product molecules', true, v => S.showMolecules = v);
ui.toggle(gv, 'Soot build-up', true, v => S.showSoot = v, { swatch: '#1e293b' });
ui.toggle(gv, 'Labels', true, v => S.labels = v);
ui.toggle(gv, 'Energy bar', true, v => S.showEnergyBar = v);

const gr = ui.group('Readings');
const roFlame = ui.readout(gr, 'Flame type', '');
const roProducts = ui.readout(gr, 'Products', '');

const foot = ui.footer('');
ui.hint('Drag to rotate · shift+drag to pan · scroll / pinch to zoom');

const { canvas, ctx, W, H } = SimCanvas();
const eng = Engine3D(canvas, { dist: 10, yaw: 0.5, pitch: 0.22 });

const TIP_Y = 0.9; // barrel top, where the flame sits
let molecules = []; // { x,y,z, vy, life, maxLife, color, label }
let sootPts = null; // fixed random cloud, revealed count grows with sootLevel
let sootLevel = 0;
let energyCur = 0.6;
let simT = 0, lastT = 0;

function makeSootCloud() {
  const pts = [];
  for (let i = 0; i < 40; i++) {
    const a = Math.random() * Math.PI * 2, r = 0.15 + Math.random() * 0.55;
    pts.push({ x: Math.cos(a) * r, y: TIP_Y + 0.6 + Math.random() * 1.6, z: Math.sin(a) * r, ph: Math.random() * 10 });
  }
  return pts;
}
sootPts = makeSootCloud();

/* flame silhouette: a camera-facing polygon (teardrop) — like the litmus
   strip trick, extended into a filled shape instead of a single line */
function flamePoly(eng, height, maxWidth, tOffset) {
  const sv = sideVec(eng);
  const N = 14;
  const left = [], right = [];
  for (let i = 0; i <= N; i++) {
    const u = i / N;
    const w = maxWidth * Math.max(0, 1 - u * u) * Math.min(1, u / 0.1) * (1 + 0.05 * Math.sin(u * 6 + tOffset));
    const y = TIP_Y + u * height;
    left.push([-sv[0] * w, y, -sv[2] * w]);
    right.push([sv[0] * w, y, sv[2] * w]);
  }
  return left.concat(right.reverse());
}

function frame(tms) {
  const t = tms / 1000, dt = Math.min(t - lastT, 0.04); lastT = t; simT += dt;

  const complete = S.air >= 60;
  const airFrac = S.air / 100;

  const targetHeight = complete ? 1.7 + airFrac * 1.1 : 1.3 + airFrac * 0.5;
  const targetWidth = complete ? 0.5 - airFrac * 0.12 : 0.62 - airFrac * 0.1;
  const flicker = complete ? 0.04 : 0.11;
  const height = targetHeight * (1 + flicker * Math.sin(simT * (complete ? 6 : 9)));
  const width = targetWidth * (1 + flicker * 0.5 * Math.sin(simT * 11 + 1));

  /* soot builds up while incomplete, dissipates while complete */
  if (!complete && S.showSoot) sootLevel = Math.min(sootPts.length, sootLevel + dt * 6);
  else sootLevel = Math.max(0, sootLevel - dt * 10);

  /* product molecules */
  if (S.showMolecules) {
    spawnTimerCO2 -= dt; spawnTimerH2O -= dt; spawnTimerCO -= dt;
    if (spawnTimerCO2 <= 0) { spawn('CO2', '#475569', 'CO₂'); spawnTimerCO2 = 0.5; }
    if (spawnTimerH2O <= 0) { spawn('H2O', '#93c5fd', 'H₂O'); spawnTimerH2O = 0.5; }
    if (!complete && spawnTimerCO <= 0) { spawn('CO', '#ea580c', 'CO'); spawnTimerCO = 0.7; }
  }
  for (let i = molecules.length - 1; i >= 0; i--) {
    const m = molecules[i];
    m.y += m.vy * dt;
    m.x += Math.sin(simT * 2 + m.y) * 0.15 * dt;
    m.life -= dt;
    if (m.life <= 0) molecules.splice(i, 1);
  }

  /* energy bar target */
  energyCur += ((complete ? 0.92 : 0.32) - energyCur) * Math.min(1, dt * 2);

  ctx.clearRect(0, 0, W(), H());
  eng.begin(W(), H());

  /* bench */
  for (let g = -4; g <= 4.01; g += 2) {
    eng.line([[g, -1.62, -4], [g, -1.62, 4]], { color: '#eef2f7', width: 1.5 });
    eng.line([[-4, -1.62, g], [4, -1.62, g]], { color: '#eef2f7', width: 1.5 });
  }

  /* bunsen burner */
  eng.box([0, -1.5, 0], 0.9, 0.15, 0.9, '#475569', { stroke: INK, strokeWidth: 2 });
  eng.box([0, -0.55, 0], 0.22, 1.05, 0.22, '#94a3b8', { stroke: INK, strokeWidth: 2 });
  eng.box([0, -1.05, 0], 0.28, 0.22, 0.28, '#334155', { stroke: INK, strokeWidth: 1.5 });
  const holeH = 0.05 + 0.16 * airFrac;
  eng.box([0.25, -1.05, 0], 0.03, holeH, 0.12, '#0f172a');
  eng.box([-0.25, -1.05, 0], 0.03, holeH, 0.12, '#0f172a');
  if (S.labels) eng.label([0.55, -1.05, 0.3], 'air hole', { color: '#475569', size: 13, lift: 2 });

  /* flame: 3 nested translucent camera-facing cones */
  const cComplete = ['rgba(37,99,235,0.3)', 'rgba(59,130,246,0.5)', 'rgba(191,219,254,0.75)'];
  const cIncomplete = ['rgba(234,88,12,0.3)', 'rgba(249,115,22,0.55)', 'rgba(253,224,71,0.8)'];
  const cols = complete ? cComplete : cIncomplete;
  eng.poly(flamePoly(eng, height, width, 0), cols[0]);
  eng.poly(flamePoly(eng, height * 0.75, width * 0.7, 2), cols[1], { depthBias: -0.01 });
  eng.poly(flamePoly(eng, height * 0.45, width * 0.4, 4), cols[2], { depthBias: -0.02 });

  /* soot cloud above/around the flame */
  if (S.showSoot) {
    const n = Math.round(sootLevel);
    for (let i = 0; i < n; i++) {
      const p = sootPts[i];
      const bob = Math.sin(simT * 1.5 + p.ph) * 0.05;
      eng.sphere([p.x, p.y + bob, p.z], 0.05, '#1e293b', { highlight: '#334155' });
    }
  }

  /* product molecules */
  for (const m of molecules) {
    const alpha = Math.max(0, Math.min(1, m.life / m.maxLife));
    eng.sphere([m.x, m.y, m.z], 0.13, m.color, { highlight: m.color, label: S.labels ? m.label : '' });
  }

  if (S.labels) eng.label([0, -1.75, 1.0], FUELS[S.fuel].name + ' burner', { color: '#475569', size: 15, lift: 2 });

  eng.flush(ctx);

  if (S.showEnergyBar) drawEnergyBar();

  roFlame.set(complete ? 'Complete (blue, hot)' : 'Incomplete (yellow, sooty)');
  roProducts.set(complete ? 'CO₂ + H₂O' : 'C (soot) + CO + H₂O');

  const fuelName = FUELS[S.fuel].name;
  let footHtml;
  if (complete) {
    footHtml = fuelName + ' + plenty of oxygen &rarr; carbon dioxide + water (+ lots of energy)';
    if (FUELS[S.fuel].symbol) footHtml += ' &nbsp;&middot;&nbsp; <b>' + FUELS[S.fuel].symbol + '</b>';
  } else {
    footHtml = fuelName + ' + limited oxygen &rarr; carbon (soot) + carbon monoxide + water &nbsp;&middot;&nbsp; ' +
      '<b>CO is a colourless, odourless, toxic gas</b>';
  }
  foot.set(footHtml);

  requestAnimationFrame(frame);
}

let spawnTimerCO2 = 0, spawnTimerH2O = 0.2, spawnTimerCO = 0.4;
function spawn(type, color, label) {
  const a = Math.random() * Math.PI * 2, r = Math.random() * 0.12;
  molecules.push({
    x: Math.cos(a) * r, y: TIP_Y + 0.3, z: Math.sin(a) * r,
    vy: 0.5 + Math.random() * 0.3, life: 2.2, maxLife: 2.2, color, label
  });
}

function drawEnergyBar() {
  const bw = 46, bh = 220, bx = 50, by = H() - bh - 150;
  ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.strokeStyle = INK; ctx.lineWidth = 3;
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(bx - 10, by - 34, bw + 20, bh + 44, 10); else ctx.rect(bx - 10, by - 34, bw + 20, bh + 44);
  ctx.fill(); ctx.stroke();
  Draw.label(ctx, 'Energy', bx + bw / 2, by - 18, { size: 13, color: '#475569' });
  ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 2;
  ctx.strokeRect(bx, by, bw, bh);
  const fillH = bh * energyCur;
  const grad = ctx.createLinearGradient(0, by + bh - fillH, 0, by + bh);
  grad.addColorStop(0, '#f97316'); grad.addColorStop(1, '#dc2626');
  ctx.fillStyle = grad;
  ctx.fillRect(bx, by + bh - fillH, bw, fillH);
  ctx.strokeStyle = INK; ctx.lineWidth = 2.5;
  ctx.strokeRect(bx, by, bw, bh);
}

window.BOOT_DONE = true;
requestAnimationFrame(frame);
</script>
</body>
</html>
