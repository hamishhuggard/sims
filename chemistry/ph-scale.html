<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pH &amp; Indicators — 3D</title>
<link rel="stylesheet" href="../sim.css">
</head>
<body>
<canvas id="sim"></canvas>
<script src="../lib/theme.js"></script>
<script src="../lib/ui.js"></script>
<script src="../lib/engine3d.js"></script>
<script src="../lib/vessel.js"></script>
<script>
'use strict';
const INK = '#1a1a2e';
const H_COL = '#e63946', OH_COL = '#2563eb', OH_H_COL = '#93c5fd';

const SUBSTANCES = [
  { label: 'Hydrochloric acid', ph: 1 },
  { label: 'Stomach acid', ph: 2 },
  { label: 'Lemon juice', ph: 2.5 },
  { label: 'Vinegar', ph: 3 },
  { label: 'Fizzy drink', ph: 4 },
  { label: 'Black coffee', ph: 5 },
  { label: 'Milk', ph: 6.5 },
  { label: 'Pure water', ph: 7 },
  { label: 'Blood', ph: 7.4 },
  { label: 'Seawater', ph: 8 },
  { label: 'Baking soda', ph: 9 },
  { label: 'Soap', ph: 10 },
  { label: 'Ammonia', ph: 11 },
  { label: 'Bleach', ph: 12.5 },
  { label: 'Oven cleaner (NaOH)', ph: 14 }
];

/* universal indicator ramp, index = round(pH), 0..14 */
const UNIVERSAL = ['#c81d25', '#e01b24', '#f04e23', '#f68b1f', '#fbba16', '#f7e017', '#c6d92d',
  '#4cae4f', '#3aa17e', '#2e9599', '#2273b5', '#2a52a1', '#31408f', '#3a2f7d', '#46266b'];

function classify(ph) {
  if (ph < 3) return 'strong acid';
  if (ph < 6.5) return 'weak acid';
  if (ph > 6.5 && ph < 7.5) return 'neutral';
  if (ph <= 11) return 'weak alkali';
  return 'strong alkali';
}

/* Titration model: each substance's pH implies a net "acidity" concentration
   (equivalent [H+] - [OH-]); mixing two volumes mixes those concentrations,
   same approach as neutralisation.html's fixed-HCl/NaOH formula, generalised
   to any two pH values so any substance pair can be dripped together. */
function acidity(ph) { return Math.pow(10, -ph) - Math.pow(10, ph - 14); }
function titrationPH(ph0, phT, V0, Vt) {
  const c = (V0 * acidity(ph0) + Vt * acidity(phT)) / (V0 + Vt);
  let ph;
  if (c > 1e-7) ph = -Math.log10(c);
  else if (c < -1e-7) ph = 14 + Math.log10(-c);
  else ph = 7;
  return Math.max(0.2, Math.min(13.8, ph));
}
const V0_CONST = 25, VT_MAX = 40;

const S = {
  ph0: 7,
  dripMode: false, tPh: 1, Vt: 0, dripRate: 1.5, dripping: false, showTitrationGraph: true,
  indicator: 'none', // none | universal | litmus | phenolphthalein
  showH: true, showOH: true, showWater: true, showBar: true, labels: true,
  labelledIons: false, // false = accurate molecule models (bare H+, bonded O-H for OH-); true = simple labelled spheres
  sizeMul: 1, countMul: 1, speed: 1
};

const ui = SimUI({ back: '../index.html', title: 'pH & Indicators', subtitle: 'Acids release H⁺, bases release OH⁻ — drag to orbit, scroll to zoom' });

const gs = ui.group('Substance');
const CUSTOM_PH = '__custom__';
let syncingPH = false;
const substanceOptions = [{ value: CUSTOM_PH, label: 'Custom pH' }]
  .concat(SUBSTANCES.map(s => ({ value: s.label, label: s.label })));
const substanceSelect = ui.select(gs, 'Pick a substance', substanceOptions, 'Pure water', v => {
  if (syncingPH) return;
  const sub = SUBSTANCES.find(s => s.label === v);
  if (sub) { syncingPH = true; phSlider.set(sub.ph); syncingPH = false; }
});
const phSlider = ui.slider(gs, 'pH', { min: 0, max: 14, step: 0.5, value: 7, fmt: v => v.toFixed(1) }, v => {
  S.ph0 = v;
  if (!syncingPH) { syncingPH = true; substanceSelect.set(CUSTOM_PH); syncingPH = false; }
});

const gt = ui.group('Titration (drip in)');
let dripStartBtn;
ui.toggle(gt, 'Enable dripping', false, v => {
  S.dripMode = v;
  dripSub.style.display = v ? '' : 'none';
  if (!v) { S.Vt = 0; S.dripping = false; drops.length = 0; dripStartBtn.textContent = '▶ Start drip'; }
});
const dripSub = document.createElement('div');
dripSub.style.display = 'none';
gt.appendChild(dripSub);

let syncingTPH = false;
const CUSTOM_PH_T = '__customT__';
const titrantOptions = [{ value: CUSTOM_PH_T, label: 'Custom pH' }]
  .concat(SUBSTANCES.map(s => ({ value: s.label, label: s.label })));
const titrantSelect = ui.select(dripSub, 'Titrant (in the burette)', titrantOptions, 'Hydrochloric acid', v => {
  if (syncingTPH) return;
  const sub = SUBSTANCES.find(s => s.label === v);
  if (sub) { syncingTPH = true; titrantPhSlider.set(sub.ph); syncingTPH = false; }
});
const titrantPhSlider = ui.slider(dripSub, 'Titrant pH', { min: 0, max: 14, step: 0.5, value: 1, fmt: v => v.toFixed(1) }, v => {
  S.tPh = v;
  if (!syncingTPH) { syncingTPH = true; titrantSelect.set(CUSTOM_PH_T); syncingTPH = false; }
});
const dripBtnRow = ui.buttons(dripSub, [
  { label: '▶ Start drip', primary: true, onClick: () => {
      S.dripping = !S.dripping;
      dripStartBtn.textContent = S.dripping ? '⏸ Pause drip' : '▶ Start drip';
    } },
  { label: '+1 mL', onClick: () => { S.Vt = Math.min(VT_MAX, S.Vt + 1); } },
  { label: '⟲ Reset', onClick: () => {
      S.Vt = 0; S.dripping = false; drops.length = 0;
      dripStartBtn.textContent = '▶ Start drip';
    } }
]);
dripStartBtn = dripBtnRow.querySelectorAll('button')[0];
ui.slider(dripSub, 'Drip rate', { min: 0.5, max: 5, step: 0.5, value: 1.5, fmt: v => v.toFixed(1) + ' mL/s' }, v => S.dripRate = v);
ui.buttons(dripSub, [
  { label: '⇄ Swap tube / titrant', onClick: () => {
      const a = phSlider.get(), b = titrantPhSlider.get();
      phSlider.set(b);
      titrantPhSlider.set(a);
      S.Vt = 0; S.dripping = false; drops.length = 0;
      dripStartBtn.textContent = '▶ Start drip';
    } }
]);
ui.toggle(dripSub, 'pH vs volume graph', true, v => S.showTitrationGraph = v);

const gi = ui.group('Indicator');
ui.segment(gi, null, [
  { value: 'none', label: 'None' },
  { value: 'universal', label: 'Universal' },
  { value: 'litmus', label: 'Litmus' },
  { value: 'phenolphthalein', label: 'Phenolphthalein' }
], 'none', v => S.indicator = v);

const gp = ui.group('Particles');
ui.slider(gp, 'Particle size', { min: 0.4, max: 3, step: 0.1, value: 1, fmt: v => v.toFixed(1) + '×' }, v => S.sizeMul = v);
ui.slider(gp, 'Number of particles', { min: 0.3, max: 3, step: 0.1, value: 1, fmt: v => v.toFixed(1) + '×' }, v => S.countMul = v);
ui.slider(gp, 'Simulation speed', { min: 0, max: 3, step: 0.1, value: 1, fmt: v => v.toFixed(1) + '×' }, v => S.speed = v);

const gv = ui.group('Show / hide');
ui.toggle(gv, 'H⁺ ions', true, v => S.showH = v, { swatch: H_COL });
ui.toggle(gv, 'OH⁻ ions', true, v => S.showOH = v, { swatch: OH_COL });
ui.toggle(gv, 'Water molecules', true, v => S.showWater = v, { swatch: '#94a3b8' });
ui.toggle(gv, 'pH scale bar', true, v => S.showBar = v);
ui.toggle(gv, 'Labels', true, v => S.labels = v);
ui.toggle(gv, 'Labelled spheres (vs molecule models)', false, v => S.labelledIons = v);

const gr = ui.group('Readings');
const roPH = ui.readout(gr, 'pH', '');
const roClass = ui.readout(gr, 'Classification', '');

const foot = ui.footer('');
ui.hint('Drag to rotate · shift+drag to pan · scroll / pinch to zoom');

const { canvas, ctx, W, H } = SimCanvas();
const eng = Engine3D(canvas, { dist: 13.5, yaw: 0.5, pitch: 0.28, target: [0, 0.1, 0] });

/* round-bottomed test tube, held in a clamp stand above the bench */
const VESSEL = { r: 0.6, y0: -2.1, y1: 2.7, level: 1.26 };
const BENCH = -2.5;
const STAND = '#64748b', STAND_DARK = '#475569';
const swarm = ParticleSwarm({
  r: VESSEL.r * 0.88,
  y0: VESSEL.y0 + VESSEL.r * 0.12,
  y1: VESSEL.level - 0.1,
  bowl: { yc: VESSEL.y0 + VESSEL.r, r: VESSEL.r * 0.88 }
});

/* burette, shown above the tube only while dripping is enabled */
const BUR = { r: 0.22, y0: 3.15, y1: 5.3 };
const TIP_Y = BUR.y0 - 0.15;
const drops = []; // { y }
let dropTimer = 0;
function buretteLevel() {
  return BUR.y0 + ((BUR.y1 - BUR.y0) / 50) * (50 - S.Vt);
}

/* ball-and-stick specs for "molecule models" mode (local +x = heading) */
const MOL_OH = {
  atoms: [
    { d: [0, 0, 0], r: 0.05, color: OH_COL, label: '−' },
    { d: [0.09, 0, 0], r: 0.026, color: OH_H_COL }
  ],
  bonds: [[0, 1]], bondColor: OH_COL, bondW: 2
};
const MOL_H2O = {
  atoms: [
    { d: [0, 0, 0], r: 0.042, color: '#94a3b8' },
    { d: [0.046, 0.059, 0], r: 0.022, color: '#e2e8f0' },
    { d: [0.046, -0.059, 0], r: 0.022, color: '#e2e8f0' }
  ],
  bonds: [[0, 1], [0, 2]], bondColor: '#94a3b8', bondW: 1.8
};

function liquidColour(ph) {
  if (S.indicator === 'universal') {
    return hexToRgba(UNIVERSAL[Math.round(ph)], 0.55);
  }
  if (S.indicator === 'phenolphthalein') {
    return ph > 8.3 ? 'rgba(236,72,153,0.5)' : 'rgba(210,225,235,0.35)';
  }
  return 'rgba(180,205,225,0.4)'; // pale blue-grey default (also litmus: don't tint)
}

function hexToRgba(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return 'rgba(' + [(n >> 16) & 255, (n >> 8) & 255, n & 255].join(',') + ',' + a + ')';
}

/* Spectrum shown on the pH bar: the universal-indicator rainbow only makes
   sense when no indicator (or "universal") is selected. Litmus and
   phenolphthalein each have their own two-tone colour change, so the bar
   should show *that* instead — a set of {ph, hex} stops to interpolate
   between, or null to fall back to the discrete UNIVERSAL rainbow cells. */
function phBarStops() {
  if (S.indicator === 'phenolphthalein') {
    return [[0, '#f8fafc'], [8.2, '#f8fafc'], [10, '#ec4899'], [14, '#ec4899']];
  }
  if (S.indicator === 'litmus') {
    return [[0, '#e63946'], [6, '#e63946'], [7, '#2563eb'], [14, '#2563eb']];
  }
  return null;
}
function lerpHex(a, b, t) {
  const na = parseInt(a.slice(1), 16), nb = parseInt(b.slice(1), 16);
  const ar = (na >> 16) & 255, ag = (na >> 8) & 255, ab = na & 255;
  const br = (nb >> 16) & 255, bg = (nb >> 8) & 255, bb = nb & 255;
  return 'rgb(' + Math.round(ar + (br - ar) * t) + ',' + Math.round(ag + (bg - ag) * t) + ',' + Math.round(ab + (bb - ab) * t) + ')';
}
function colourAtPH(ph, stops) {
  for (let i = 0; i < stops.length - 1; i++) {
    const [p0, c0] = stops[i], [p1, c1] = stops[i + 1];
    if (ph <= p1) return lerpHex(c0, c1, p1 === p0 ? 0 : (ph - p0) / (p1 - p0));
  }
  return stops[stops.length - 1][1];
}

/* pH spectrum strip, standing upright beside the test tube — in the tube's
   z=0 plane (the "stand-tube plane"), facing the default camera position
   (yaw 0.5, pitch 0.28) the way a sign propped up next to the tube would.
   Placed on the tube's left (-x), opposite the clamp stand's rod/base
   (rotated toward +x/-z), so it doesn't collide with the arm/ring, which
   stays centred on the tube regardless of the stand's rotation. */
const PHBAR = { x: -1.55, xHalf: 0.32, y0: -1.65, y1: 1.85, z: 0 };
function drawPHBarScene(ph) {
  const stops = phBarStops();
  const { x, xHalf, y0, y1, z } = PHBAR;
  const len = y1 - y0;
  const n = stops ? 30 : 15;
  for (let i = 0; i < n; i++) {
    const t0 = i / n, t1 = (i + 1) / n;
    const ya = y0 + t0 * len, yb = y0 + t1 * len;
    const col = stops ? colourAtPH(((t0 + t1) / 2) * 14, stops) : UNIVERSAL[i];
    eng.poly([
      [x - xHalf, ya, z], [x + xHalf, ya, z],
      [x + xHalf, yb, z], [x - xHalf, yb, z]
    ], col, { depthBias: -0.02 });
  }
  eng.line([[x - xHalf, y0, z], [x + xHalf, y0, z], [x + xHalf, y1, z], [x - xHalf, y1, z], [x - xHalf, y0, z]],
    { color: INK, width: 3 });

  /* numbers sit to the left of the strip (away from the tube), painted
     flat into the strip's own plane (not billboard sprites) so they read
     like ink printed on a sign, not a sprite floating in front of it */
  const flatOpts = { right: [1, 0, 0], up: [0, -1, 0], align: 'right' };
  const numX = x - xHalf - 0.18;
  for (let i = 0; i <= 14; i += 2) {
    const yy = y0 + (i / 14) * len;
    eng.line([[x - xHalf, yy, z], [x - xHalf - 0.12, yy, z]], { color: INK, width: 2 });
    eng.flatLabel([numX, yy, z], String(i), Object.assign({ color: INK, size: 0.22, weight: 700 }, flatOpts));
  }

  /* acid/neutral/alkali labels sit further left, same plane, level with
     the middle of their respective zone on the strip */
  const labX = numX - 0.42;
  eng.flatLabel([labX, y0 + (2 / 14) * len, z], 'ACID', Object.assign({ color: '#c81d25', size: 0.2, weight: 800 }, flatOpts));
  eng.flatLabel([labX, y0 + (7 / 14) * len, z], 'NEUTRAL', Object.assign({ color: '#3aa17e', size: 0.2, weight: 800 }, flatOpts));
  eng.flatLabel([labX, y0 + (12 / 14) * len, z], 'ALKALI', Object.assign({ color: '#31408f', size: 0.2, weight: 800 }, flatOpts));

  /* a flat red triangle to the right of the strip (tube side), same plane,
     pointing left at the current pH's height */
  const py = y0 + (ph / 14) * len;
  const triTipX = x + xHalf + 0.03, triW = 0.16, triH = 0.26;
  eng.poly([
    [triTipX, py, z],
    [triTipX + triH, py - triW, z],
    [triTipX + triH, py + triW, z]
  ], '#e63946', { depthBias: -0.03 });
}

let lastT = 0;
function frame(tms) {
  const t = tms / 1000, dt = Math.min(t - lastT, 0.04); lastT = t;

  if (S.dripMode) {
    if (S.dripping && S.Vt < VT_MAX) {
      S.Vt = Math.min(VT_MAX, S.Vt + S.dripRate * dt);
      dropTimer -= dt;
      if (dropTimer <= 0) { drops.push({ y: TIP_Y }); dropTimer = Math.max(0.08, 0.5 / S.dripRate); }
    }
    if (S.Vt >= VT_MAX && S.dripping) { S.dripping = false; dripStartBtn.textContent = '▶ Start drip'; }
  }
  const ph = S.dripMode ? titrationPH(S.ph0, S.tPh, V0_CONST, S.Vt) : S.ph0;
  const level = S.dripMode ? Math.min(VESSEL.y1 - 0.35, VESSEL.level + 0.018 * S.Vt) : VESSEL.level;

  /* advance falling drops, remove on landing */
  for (let i = drops.length - 1; i >= 0; i--) {
    drops[i].y -= 3.2 * dt;
    if (drops[i].y <= level) drops.splice(i, 1);
  }

  const nH = Math.max(0, Math.min(50, Math.round(6 * S.countMul * Math.pow(10, (7 - ph) / 2.6))));
  const nOH = Math.max(0, Math.min(50, Math.round(6 * S.countMul * Math.pow(10, (ph - 7) / 2.6))));

  // real relative scale, exaggerated just enough to stay visible: a bare H+
  // (a proton with no electron cloud) is dramatically smaller than a whole
  // molecule like OH- or H2O — orbit/zoom in to see the H+ dust properly.
  // In "labelled spheres" mode both ions get a bigger, uniform, readable size.
  const hR = (S.labelledIons ? 0.09 : 0.018) * S.sizeMul;
  const oR = (S.labelledIons ? 0.09 : 0.05) * S.sizeMul;
  const wR = (S.labelledIons ? 0.08 : 0.04) * S.sizeMul;
  swarm.want('H+', { n: S.showH ? nH : 0, radius: hR, speed: 0.8 });
  swarm.want('OH-', { n: S.showOH ? nOH : 0, radius: oR, speed: 0.7 });
  swarm.want('H2O', { n: S.showWater ? Math.round(30 * S.countMul) : 0, radius: wR, speed: 0.5 });
  swarm.setRegion({ y1: level - 0.1 });
  swarm.step(dt * S.speed);

  ctx.clearRect(0, 0, W(), H());
  eng.begin(W(), H());

  /* bench grid */
  for (let g = -4; g <= 4.01; g += 2) {
    eng.line([[g, BENCH, -4], [g, BENCH, 4]], { color: '#eef2f7', width: 1.5 });
    eng.line([[-4, BENCH, g], [4, BENCH, g]], { color: '#eef2f7', width: 1.5 });
  }

  /* clamp stand holding the tube: base, rod, arm, ring clamp around the tube (ring sits
     just below the rim). The base plate is elongated toward the tube (-x, the direction
     the arm reaches) so the assembly reads as stable rather than top-heavy: rod sits at
     x=2.2 before rotation, base runs from x=0.4 (nearly under the clamped tube) to x=2.75
     (behind the rod). The whole assembly is rotated 45° (screen-counterclockwise) around
     the tube's vertical axis so it clears the pH bar on the left; the ring circle is
     centred on that same axis so it needs no rotation itself. In drip mode the burette
     hangs from its own separate, unrotated stand at this stand's original position, since
     it doesn't need to move with the tube clamp. */
  const STAND_ROT = -Math.PI / 4;
  const rotStand = ([x, y, z]) => [x * Math.cos(STAND_ROT) - z * Math.sin(STAND_ROT), y, x * Math.sin(STAND_ROT) + z * Math.cos(STAND_ROT)];
  const clampY = VESSEL.y1 - 0.7;
  const rodBottom = -2.45, rodTop = clampY + 0.4;
  const baseX0 = 0.4, baseX1 = 2.75;
  const baseHalfX = (baseX1 - baseX0) / 2, baseCx = (baseX0 + baseX1) / 2;
  eng.box([baseCx, BENCH + 0.06, 0], baseHalfX, 0.06, 0.55, STAND_DARK, { stroke: INK, strokeWidth: 1, transform: rotStand });
  eng.box([2.2, (rodBottom + rodTop) / 2, 0], 0.06, (rodTop - rodBottom) / 2, 0.06, STAND, { stroke: INK, strokeWidth: 1, transform: rotStand });
  const ringR = VESSEL.r + 0.07;
  eng.box([(2.2 + ringR) / 2, clampY, 0], (2.2 - ringR) / 2, 0.05, 0.05, STAND, { stroke: INK, strokeWidth: 1, transform: rotStand });
  eng.line(circle3(clampY, ringR), { color: STAND_DARK, width: 6 });

  if (S.dripMode) {
    /* separate, unrotated stand at the original stand position, holding the burette above the tube */
    const clampY2 = BUR.y0 + 0.15;
    const rodTop2 = clampY2 + 0.4;
    const ringR2 = BUR.r + 0.06;
    eng.box([baseCx, BENCH + 0.06, 0], baseHalfX, 0.06, 0.55, STAND_DARK, { stroke: INK, strokeWidth: 1 });
    eng.box([2.2, (rodBottom + rodTop2) / 2, 0], 0.06, (rodTop2 - rodBottom) / 2, 0.06, STAND, { stroke: INK, strokeWidth: 1 });
    eng.box([(2.2 + ringR2) / 2, clampY2, 0], (2.2 - ringR2) / 2, 0.05, 0.05, STAND, { stroke: INK, strokeWidth: 1 });
    eng.line(circle3(clampY2, ringR2), { color: STAND_DARK, width: 5 });

    drawBeaker(eng, { r: BUR.r, y0: BUR.y0, y1: BUR.y1, level: buretteLevel(), liquid: 'rgba(160,190,225,0.45)' });
    eng.box([0, BUR.y0 - 0.15, 0], 0.11, 0.15, 0.11, '#334155', { stroke: INK, strokeWidth: 1.5 });
    if (S.labels) eng.label([0, BUR.y1 + 0.35, 0], 'titrant, pH ' + S.tPh.toFixed(1), { color: '#475569', size: 15, lift: 3 });
    for (const d of drops) eng.sphere([0, d.y, 0], 0.06, '#60a5fa');
  }

  drawTestTube(eng, Object.assign({}, VESSEL, { level, liquid: liquidColour(ph) }));

  /* H2O : small background molecules (bent ball-and-stick in molecule mode) */
  for (const pt of swarm.list('H2O')) {
    if (S.labelledIons) eng.sphere(pt.p, wR, '#cbd5e1', S.labels ? { label: 'H₂O', labelColor: INK } : {});
    else drawMolecule(eng, pt.p, pt.v, MOL_H2O, { scale: S.sizeMul });
  }

  if (S.labelledIons) {
    /* simplified: one uniform, clearly labelled sphere per ion */
    for (const pt of swarm.list('H+')) {
      eng.sphere(pt.p, hR, H_COL, S.labels ? { label: 'H⁺', stroke: 'rgba(26,26,46,0.3)', strokeWidth: 1.5 } : {});
    }
    for (const pt of swarm.list('OH-')) {
      eng.sphere(pt.p, oR, OH_COL, S.labels ? { label: 'OH⁻', stroke: 'rgba(26,26,46,0.3)', strokeWidth: 1.5 } : {});
    }
  } else {
    /* H+ : a bare proton — tiny dust, labelled */
    for (const pt of swarm.list('H+')) {
      eng.sphere(pt.p, hR, H_COL, S.labels ? { label: '+', stroke: 'rgba(26,26,46,0.3)', strokeWidth: 1 } : {});
    }
    /* OH- : an actual two-atom molecule — O (bigger, labelled) bonded to a
       smaller H, oriented along its current heading so it tumbles naturally */
    for (const pt of swarm.list('OH-')) {
      drawMolecule(eng, pt.p, pt.v, MOL_OH, { scale: S.sizeMul, showLabels: S.labels });
    }
  }

  /* litmus paper strip — a flat rectangle of paper, dipped into the beaker.
     Blue litmus paper: turns red in acid, stays blue in neutral/alkali.
     Built as a camera-facing billboard quad (width along sideVec, the
     screen-right direction) so it always reads as a flat strip, not an
     edge-on line, from any orbit angle. */
  if (S.indicator === 'litmus') {
    const turned = ph < 6.5;
    const baseCol = '#2563eb', changedCol = '#e63946';
    const sv = sideVec(eng);
    const sx = sv[0] * 0.55, sz = sv[2] * 0.55;
    const halfW = 0.14;
    const stripTop = VESSEL.y1 + 0.6, stripBottom = VESSEL.y0 + 0.75;
    const submergedY = level - 0.05;
    const corner = (y, sign) => [sx + sv[0] * halfW * sign, y, sz + sv[2] * halfW * sign];
    // dry (upper) half — always the original colour
    eng.poly([corner(stripTop, -1), corner(stripTop, 1), corner(submergedY, 1), corner(submergedY, -1)],
      baseCol, { stroke: 'rgba(26,26,46,0.35)', strokeWidth: 1.5 });
    // submerged half — turns colour if past the threshold
    eng.poly([corner(submergedY, -1), corner(submergedY, 1), corner(stripBottom, 1), corner(stripBottom, -1)],
      turned ? changedCol : baseCol, { stroke: 'rgba(26,26,46,0.35)', strokeWidth: 1.5 });
    if (S.labels) eng.label([sx, stripTop + 0.3, sz], 'litmus paper', { color: '#475569', size: 15, lift: 2 });
  }

  if (S.showBar) drawPHBarScene(ph);

  eng.flush(ctx);

  if (S.dripMode && S.showTitrationGraph) drawTitrationGraph(ph);

  roPH.set(ph.toFixed(1));
  const cls = classify(ph);
  roClass.set(cls.charAt(0).toUpperCase() + cls.slice(1));

  const dominant = ph < 7 ? 'more H⁺ than OH⁻' : (ph > 7 ? 'more OH⁻ than H⁺' : 'equal H⁺ and OH⁻');
  const kind = ph < 7 ? 'Acids release hydrogen ions (H⁺) in water.' : (ph > 7 ? 'Bases release hydroxide ions (OH⁻) in water.' : 'Pure water is neutral.');
  if (S.dripMode) {
    const region = Math.abs(ph - 7) < 0.4 ? 'near neutral — H⁺ and OH⁻ combining into water' : (ph < 7 ? 'still net acidic' : 'still net basic');
    foot.set(S.Vt.toFixed(1) + ' mL of titrant added, pH ' + ph.toFixed(1) + ' — <b>' + cls + '</b>: ' + region + '.');
  } else {
    foot.set('pH ' + ph.toFixed(1) + ' — <b>' + cls + '</b>: ' + dominant + '. ' + kind);
  }

  requestAnimationFrame(frame);
}

/* pH vs volume titration curve, bottom-left 2D overlay (drip mode only) */
function drawTitrationGraph(ph) {
  const gw = Math.min(430, W() * 0.42), gh = 200;
  const gx = 20, gy = H() - gh - 20;
  ctx.fillStyle = 'rgba(255,255,255,0.94)';
  ctx.strokeStyle = INK;
  ctx.lineWidth = 3;
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(gx, gy, gw, gh, 12); else ctx.rect(gx, gy, gw, gh);
  ctx.fill(); ctx.stroke();

  const mx = gx + 40, mw = gw - 54, my = gy + 14, mh = gh - 44;
  ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(mx, my); ctx.lineTo(mx, my + mh); ctx.lineTo(mx + mw, my + mh); ctx.stroke();
  Draw.label(ctx, 'pH', gx + 16, my + 6, { size: 13, color: '#475569' });
  Draw.label(ctx, '14', mx - 10, my, { size: 12, color: '#475569', align: 'right' });
  Draw.label(ctx, '0', mx - 10, my + mh, { size: 12, color: '#475569', align: 'right' });
  Draw.label(ctx, 'Titrant added (mL) →', mx + mw / 2, gy + gh - 12, { size: 12, color: '#475569' });
  Draw.label(ctx, String(VT_MAX), mx + mw, my + mh + 14, { size: 11, color: '#475569' });
  Draw.label(ctx, '0', mx, my + mh + 14, { size: 11, color: '#475569' });

  // the S-curve for the current tube/titrant pH pair
  ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 3.5; ctx.lineJoin = 'round';
  ctx.beginPath();
  for (let i = 0; i <= 100; i++) {
    const v = (i / 100) * VT_MAX;
    const y = my + mh - (titrationPH(S.ph0, S.tPh, V0_CONST, v) / 14) * mh;
    const x = mx + (v / VT_MAX) * mw;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // current point
  const cx = mx + (S.Vt / VT_MAX) * mw, cy = my + mh - (ph / 14) * mh;
  ctx.fillStyle = INK;
  ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI * 2); ctx.fill();
}

window.BOOT_DONE = true;
requestAnimationFrame(frame);
</script>
