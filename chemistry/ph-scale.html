<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pH &amp; Indicators — 3D</title>
<link rel="stylesheet" href="../sim.css">
</head>
<body>
<canvas id="sim"></canvas>
<script src="../lib/theme.js"></script>
<script src="../lib/ui.js"></script>
<script src="../lib/engine3d.js"></script>
<script src="../lib/vessel.js"></script>
<script>
'use strict';
const INK = '#1a1a2e';
const H_COL = '#e63946', OH_COL = '#2563eb', OH_H_COL = '#93c5fd';

const SUBSTANCES = [
  { label: 'Hydrochloric acid', ph: 1 },
  { label: 'Stomach acid', ph: 2 },
  { label: 'Lemon juice', ph: 2.5 },
  { label: 'Vinegar', ph: 3 },
  { label: 'Fizzy drink', ph: 4 },
  { label: 'Black coffee', ph: 5 },
  { label: 'Milk', ph: 6.5 },
  { label: 'Pure water', ph: 7 },
  { label: 'Blood', ph: 7.4 },
  { label: 'Seawater', ph: 8 },
  { label: 'Baking soda', ph: 9 },
  { label: 'Soap', ph: 10 },
  { label: 'Ammonia', ph: 11 },
  { label: 'Bleach', ph: 12.5 },
  { label: 'Oven cleaner (NaOH)', ph: 14 }
];

/* universal indicator ramp, index = round(pH), 0..14 */
const UNIVERSAL = ['#c81d25', '#e01b24', '#f04e23', '#f68b1f', '#fbba16', '#f7e017', '#c6d92d',
  '#4cae4f', '#3aa17e', '#2e9599', '#2273b5', '#2a52a1', '#31408f', '#3a2f7d', '#46266b'];

function classify(ph) {
  if (ph < 3) return 'strong acid';
  if (ph < 6.5) return 'weak acid';
  if (ph > 6.5 && ph < 7.5) return 'neutral';
  if (ph <= 11) return 'weak alkali';
  return 'strong alkali';
}

const S = {
  ph: 7,
  indicator: 'none', // none | universal | litmus | phenolphthalein
  showH: true, showOH: true, showWater: true, showBar: true, labels: true,
  labelledIons: false, // false = accurate molecule models (bare H+, bonded O-H for OH-); true = simple labelled spheres
  sizeMul: 1, countMul: 1, speed: 1
};

const ui = SimUI({ back: '../index.html', title: 'pH & Indicators', subtitle: 'Acids release H⁺, bases release OH⁻ — drag to orbit, scroll to zoom' });

const gs = ui.group('Substance');
const CUSTOM_PH = '__custom__';
let syncingPH = false;
const substanceOptions = [{ value: CUSTOM_PH, label: 'Custom pH' }]
  .concat(SUBSTANCES.map(s => ({ value: s.label, label: s.label + ' (pH ' + s.ph + ')' })));
const substanceSelect = ui.select(gs, 'Pick a substance', substanceOptions, 'Pure water', v => {
  if (syncingPH) return;
  const sub = SUBSTANCES.find(s => s.label === v);
  if (sub) { syncingPH = true; phSlider.set(sub.ph); syncingPH = false; }
});
const phSlider = ui.slider(gs, 'pH', { min: 0, max: 14, step: 0.5, value: 7, fmt: v => v.toFixed(1) }, v => {
  S.ph = v;
  if (!syncingPH) { syncingPH = true; substanceSelect.set(CUSTOM_PH); syncingPH = false; }
});

const gi = ui.group('Indicator');
ui.segment(gi, null, [
  { value: 'none', label: 'None' },
  { value: 'universal', label: 'Universal' },
  { value: 'litmus', label: 'Litmus' },
  { value: 'phenolphthalein', label: 'Phenolphthalein' }
], 'none', v => S.indicator = v);

const gp = ui.group('Particles');
ui.slider(gp, 'Particle size', { min: 0.4, max: 3, step: 0.1, value: 1, fmt: v => v.toFixed(1) + '×' }, v => S.sizeMul = v);
ui.slider(gp, 'Number of particles', { min: 0.3, max: 3, step: 0.1, value: 1, fmt: v => v.toFixed(1) + '×' }, v => S.countMul = v);
ui.slider(gp, 'Simulation speed', { min: 0, max: 3, step: 0.1, value: 1, fmt: v => v.toFixed(1) + '×' }, v => S.speed = v);

const gv = ui.group('Show / hide');
ui.toggle(gv, 'H⁺ ions', true, v => S.showH = v, { swatch: H_COL });
ui.toggle(gv, 'OH⁻ ions', true, v => S.showOH = v, { swatch: OH_COL });
ui.toggle(gv, 'Water molecules', true, v => S.showWater = v, { swatch: '#94a3b8' });
ui.toggle(gv, 'pH scale bar', true, v => S.showBar = v);
ui.toggle(gv, 'Labels', true, v => S.labels = v);
ui.toggle(gv, 'Labelled spheres (vs molecule models)', false, v => S.labelledIons = v);

const gr = ui.group('Readings');
const roPH = ui.readout(gr, 'pH', '');
const roClass = ui.readout(gr, 'Classification', '');

const foot = ui.footer('');
ui.hint('Drag to rotate · shift+drag to pan · scroll / pinch to zoom');

const { canvas, ctx, W, H } = SimCanvas();
const eng = Engine3D(canvas, { dist: 13.5, yaw: 0.5, pitch: 0.28, target: [0, 0.1, 0] });

/* round-bottomed test tube, held in a clamp stand above the bench */
const VESSEL = { r: 0.6, y0: -2.1, y1: 2.7, level: 1.26 };
const BENCH = -2.5;
const STAND = '#64748b', STAND_DARK = '#475569';
const swarm = ParticleSwarm({
  r: VESSEL.r * 0.88,
  y0: VESSEL.y0 + VESSEL.r * 0.12,
  y1: VESSEL.level - 0.1,
  bowl: { yc: VESSEL.y0 + VESSEL.r, r: VESSEL.r * 0.88 }
});

/* ball-and-stick specs for "molecule models" mode (local +x = heading) */
const MOL_OH = {
  atoms: [
    { d: [0, 0, 0], r: 0.05, color: OH_COL, label: '−' },
    { d: [0.09, 0, 0], r: 0.026, color: OH_H_COL }
  ],
  bonds: [[0, 1]], bondColor: OH_COL, bondW: 2
};
const MOL_H2O = {
  atoms: [
    { d: [0, 0, 0], r: 0.042, color: '#94a3b8' },
    { d: [0.046, 0.059, 0], r: 0.022, color: '#e2e8f0' },
    { d: [0.046, -0.059, 0], r: 0.022, color: '#e2e8f0' }
  ],
  bonds: [[0, 1], [0, 2]], bondColor: '#94a3b8', bondW: 1.8
};

function liquidColour() {
  if (S.indicator === 'universal') {
    return hexToRgba(UNIVERSAL[Math.round(S.ph)], 0.55);
  }
  if (S.indicator === 'phenolphthalein') {
    return S.ph > 8.3 ? 'rgba(236,72,153,0.5)' : 'rgba(210,225,235,0.35)';
  }
  return 'rgba(180,205,225,0.4)'; // pale blue-grey default (also litmus: don't tint)
}

function hexToRgba(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return 'rgba(' + [(n >> 16) & 255, (n >> 8) & 255, n & 255].join(',') + ',' + a + ')';
}

/* Spectrum shown on the pH bar: the universal-indicator rainbow only makes
   sense when no indicator (or "universal") is selected. Litmus and
   phenolphthalein each have their own two-tone colour change, so the bar
   should show *that* instead — a set of {ph, hex} stops to interpolate
   between, or null to fall back to the discrete UNIVERSAL rainbow cells. */
function phBarStops() {
  if (S.indicator === 'phenolphthalein') {
    return [[0, '#f8fafc'], [8.2, '#f8fafc'], [10, '#ec4899'], [14, '#ec4899']];
  }
  if (S.indicator === 'litmus') {
    return [[0, '#e63946'], [6, '#e63946'], [7, '#2563eb'], [14, '#2563eb']];
  }
  return null;
}
function lerpHex(a, b, t) {
  const na = parseInt(a.slice(1), 16), nb = parseInt(b.slice(1), 16);
  const ar = (na >> 16) & 255, ag = (na >> 8) & 255, ab = na & 255;
  const br = (nb >> 16) & 255, bg = (nb >> 8) & 255, bb = nb & 255;
  return 'rgb(' + Math.round(ar + (br - ar) * t) + ',' + Math.round(ag + (bg - ag) * t) + ',' + Math.round(ab + (bb - ab) * t) + ')';
}
function colourAtPH(ph, stops) {
  for (let i = 0; i < stops.length - 1; i++) {
    const [p0, c0] = stops[i], [p1, c1] = stops[i + 1];
    if (ph <= p1) return lerpHex(c0, c1, p1 === p0 ? 0 : (ph - p0) / (p1 - p0));
  }
  return stops[stops.length - 1][1];
}

/* pH spectrum strip, sitting on the bench in front of the test tube, parallel
   to the clamp stand's base (both run along x) — on the near (+z) side, i.e.
   the side closest to the camera in the sim's starting orientation. */
const PHBAR = { x0: -2.75, x1: 0.75, z: 1.9, zHalf: 0.32, y: BENCH + 0.025 };
function drawPHBarScene() {
  const stops = phBarStops();
  const { x0, x1, z, zHalf, y } = PHBAR;
  const len = x1 - x0;
  const n = stops ? 30 : 15;
  for (let i = 0; i < n; i++) {
    const t0 = i / n, t1 = (i + 1) / n;
    const xa = x0 + t0 * len, xb = x0 + t1 * len;
    const col = stops ? colourAtPH(((t0 + t1) / 2) * 14, stops) : UNIVERSAL[i];
    eng.poly([
      [xa, y, z - zHalf], [xb, y, z - zHalf],
      [xb, y, z + zHalf], [xa, y, z + zHalf]
    ], col, { depthBias: -0.02 });
  }
  eng.line([[x0, y, z - zHalf], [x1, y, z - zHalf], [x1, y, z + zHalf], [x0, y, z + zHalf], [x0, y, z - zHalf]],
    { color: INK, width: 3 });

  /* numbers sit under the spectrum (near-camera side, same paper plane —
     printed below the colour strip, not floating above it), painted flat
     into the plane (not billboard sprites) so they skew in perspective
     like real ink on the strip as the camera orbits */
  const flatOpts = { right: [1, 0, 0], up: [0, 0, 1] };
  const numZ = z + zHalf + 0.3;
  for (let i = 0; i <= 14; i += 2) {
    const x = x0 + (i / 14) * len;
    eng.line([[x, y, z + zHalf], [x, y, z + zHalf + 0.12]], { color: INK, width: 2 });
    eng.flatLabel([x, y, numZ], String(i), Object.assign({ color: INK, size: 0.22, weight: 700 }, flatOpts));
  }

  /* acid/neutral/alkali labels sit under the numbers, same paper plane */
  const labZ = numZ + 0.32;
  eng.flatLabel([x0 + (2 / 14) * len, y, labZ], 'ACID', Object.assign({ color: '#c81d25', size: 0.2, weight: 800 }, flatOpts));
  eng.flatLabel([x0 + (7 / 14) * len, y, labZ], 'NEUTRAL', Object.assign({ color: '#3aa17e', size: 0.2, weight: 800 }, flatOpts));
  eng.flatLabel([x0 + (12 / 14) * len, y, labZ], 'ALKALI', Object.assign({ color: '#31408f', size: 0.2, weight: 800 }, flatOpts));

  /* a flat red triangle above the spectrum (far side, same paper plane),
     pointing down at the current pH's position on the strip */
  const px = x0 + (S.ph / 14) * len;
  const triTipZ = z - zHalf - 0.03, triW = 0.16, triH = 0.26;
  eng.poly([
    [px, y, triTipZ],
    [px - triW, y, triTipZ - triH],
    [px + triW, y, triTipZ - triH]
  ], '#e63946', { depthBias: -0.03 });
}

let lastT = 0;
function frame(tms) {
  const t = tms / 1000, dt = Math.min(t - lastT, 0.04); lastT = t;

  const ph = S.ph;
  const nH = Math.max(0, Math.min(50, Math.round(6 * S.countMul * Math.pow(10, (7 - ph) / 2.6))));
  const nOH = Math.max(0, Math.min(50, Math.round(6 * S.countMul * Math.pow(10, (ph - 7) / 2.6))));

  // real relative scale, exaggerated just enough to stay visible: a bare H+
  // (a proton with no electron cloud) is dramatically smaller than a whole
  // molecule like OH- or H2O — orbit/zoom in to see the H+ dust properly.
  // In "labelled spheres" mode both ions get a bigger, uniform, readable size.
  const hR = (S.labelledIons ? 0.09 : 0.018) * S.sizeMul;
  const oR = (S.labelledIons ? 0.09 : 0.05) * S.sizeMul;
  const wR = (S.labelledIons ? 0.08 : 0.04) * S.sizeMul;
  swarm.want('H+', { n: S.showH ? nH : 0, radius: hR, speed: 0.8 });
  swarm.want('OH-', { n: S.showOH ? nOH : 0, radius: oR, speed: 0.7 });
  swarm.want('H2O', { n: S.showWater ? Math.round(30 * S.countMul) : 0, radius: wR, speed: 0.5 });
  swarm.step(dt * S.speed);

  ctx.clearRect(0, 0, W(), H());
  eng.begin(W(), H());

  /* bench grid */
  for (let g = -4; g <= 4.01; g += 2) {
    eng.line([[g, BENCH, -4], [g, BENCH, 4]], { color: '#eef2f7', width: 1.5 });
    eng.line([[-4, BENCH, g], [4, BENCH, g]], { color: '#eef2f7', width: 1.5 });
  }

  /* clamp stand: base, rod, arm, ring clamp around the tube (ring sits just below the rim).
     The base plate is elongated toward the tube (+x, the direction the arm reaches) so the
     assembly reads as stable rather than top-heavy: rod stays at x=-2.2, base runs from
     x=-2.75 (behind the rod) to x=-0.4 (nearly under the clamped tube). */
  const clampY = VESSEL.y1 - 0.7;
  const rodBottom = -2.45, rodTop = clampY + 0.4;
  const baseX0 = -2.75, baseX1 = -0.4;
  const baseHalfX = (baseX1 - baseX0) / 2, baseCx = (baseX0 + baseX1) / 2;
  eng.box([baseCx, BENCH + 0.06, 0], baseHalfX, 0.06, 0.55, STAND_DARK, { stroke: INK, strokeWidth: 1 });
  eng.box([-2.2, (rodBottom + rodTop) / 2, 0], 0.06, (rodTop - rodBottom) / 2, 0.06, STAND, { stroke: INK, strokeWidth: 1 });
  const ringR = VESSEL.r + 0.07;
  eng.box([(-2.2 - ringR) / 2, clampY, 0], (2.2 - ringR) / 2, 0.05, 0.05, STAND, { stroke: INK, strokeWidth: 1 });
  eng.line(circle3(clampY, VESSEL.r + 0.07), { color: STAND_DARK, width: 6 });

  drawTestTube(eng, Object.assign({}, VESSEL, { liquid: liquidColour() }));

  /* H2O : small background molecules (bent ball-and-stick in molecule mode) */
  for (const pt of swarm.list('H2O')) {
    if (S.labelledIons) eng.sphere(pt.p, wR, '#cbd5e1', S.labels ? { label: 'H₂O', labelColor: INK } : {});
    else drawMolecule(eng, pt.p, pt.v, MOL_H2O, { scale: S.sizeMul });
  }

  if (S.labelledIons) {
    /* simplified: one uniform, clearly labelled sphere per ion */
    for (const pt of swarm.list('H+')) {
      eng.sphere(pt.p, hR, H_COL, S.labels ? { label: 'H⁺', stroke: 'rgba(26,26,46,0.3)', strokeWidth: 1.5 } : {});
    }
    for (const pt of swarm.list('OH-')) {
      eng.sphere(pt.p, oR, OH_COL, S.labels ? { label: 'OH⁻', stroke: 'rgba(26,26,46,0.3)', strokeWidth: 1.5 } : {});
    }
  } else {
    /* H+ : a bare proton — tiny dust, labelled */
    for (const pt of swarm.list('H+')) {
      eng.sphere(pt.p, hR, H_COL, S.labels ? { label: '+', stroke: 'rgba(26,26,46,0.3)', strokeWidth: 1 } : {});
    }
    /* OH- : an actual two-atom molecule — O (bigger, labelled) bonded to a
       smaller H, oriented along its current heading so it tumbles naturally */
    for (const pt of swarm.list('OH-')) {
      drawMolecule(eng, pt.p, pt.v, MOL_OH, { scale: S.sizeMul, showLabels: S.labels });
    }
  }

  /* litmus paper strip — a flat rectangle of paper, dipped into the beaker.
     Blue litmus paper: turns red in acid, stays blue in neutral/alkali.
     Built as a camera-facing billboard quad (width along sideVec, the
     screen-right direction) so it always reads as a flat strip, not an
     edge-on line, from any orbit angle. */
  if (S.indicator === 'litmus') {
    const turned = ph < 6.5;
    const baseCol = '#2563eb', changedCol = '#e63946';
    const sv = sideVec(eng);
    const sx = sv[0] * 0.55, sz = sv[2] * 0.55;
    const halfW = 0.14;
    const stripTop = VESSEL.y1 + 0.6, stripBottom = VESSEL.y0 + 0.75;
    const submergedY = VESSEL.level - 0.05;
    const corner = (y, sign) => [sx + sv[0] * halfW * sign, y, sz + sv[2] * halfW * sign];
    // dry (upper) half — always the original colour
    eng.poly([corner(stripTop, -1), corner(stripTop, 1), corner(submergedY, 1), corner(submergedY, -1)],
      baseCol, { stroke: 'rgba(26,26,46,0.35)', strokeWidth: 1.5 });
    // submerged half — turns colour if past the threshold
    eng.poly([corner(submergedY, -1), corner(submergedY, 1), corner(stripBottom, 1), corner(stripBottom, -1)],
      turned ? changedCol : baseCol, { stroke: 'rgba(26,26,46,0.35)', strokeWidth: 1.5 });
    if (S.labels) eng.label([sx, stripTop + 0.3, sz], 'litmus paper', { color: '#475569', size: 15, lift: 2 });
  }

  if (S.showBar) drawPHBarScene();

  eng.flush(ctx);

  roPH.set(ph.toFixed(1));
  const cls = classify(ph);
  roClass.set(cls.charAt(0).toUpperCase() + cls.slice(1));

  const dominant = ph < 7 ? 'more H⁺ than OH⁻' : (ph > 7 ? 'more OH⁻ than H⁺' : 'equal H⁺ and OH⁻');
  const kind = ph < 7 ? 'Acids release hydrogen ions (H⁺) in water.' : (ph > 7 ? 'Bases release hydroxide ions (OH⁻) in water.' : 'Pure water is neutral.');
  foot.set('pH ' + ph.toFixed(1) + ' — <b>' + cls + '</b>: ' + dominant + '. ' + kind);

  requestAnimationFrame(frame);
}

window.BOOT_DONE = true;
requestAnimationFrame(frame);
</script>
</body>
</html>
