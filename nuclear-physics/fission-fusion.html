<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nuclear Fission &amp; Fusion — 3D</title>
<link rel="stylesheet" href="../sim.css">
</head>
<body>
<canvas id="sim"></canvas>
<script src="../lib/theme.js"></script>
<script src="../lib/ui.js"></script>
<script src="../lib/engine3d.js"></script>
<script>
'use strict';
const INK = '#1a1a2e';
const PROTON_COL = '#e63946', NEUTRON_COL = '#94a3b8', ENERGY_COL = '#f59e0b';
const U_COL = '#a855f7', D_COL = '#2563eb', T_COL = '#16a34a', HE_COL = '#e63946';

const S = {
  mode: 'fission',
  chainReaction: true,
  totalNuclei: 100,
  gridSide: 1,
  neutronCount: 1,
  labels: true, showEnergyBar: true
};

const ui = SimUI({ back: '../index.html', title: 'Nuclear Fission & Fusion', subtitle: 'Splitting vs joining nuclei — drag to orbit, scroll to zoom' });

const gm = ui.group('Process');
ui.segment(gm, null, [
  { value: 'fission', label: 'Fission (split)' },
  { value: 'fusion', label: 'Fusion (join)' }
], 'fission', v => { S.mode = v; showModeGroups(); resetScene(); });

const gf = ui.group('Fission');
ui.toggle(gf, 'Chain reaction', true, v => S.chainReaction = v);
ui.slider(gf, 'Total nuclei', { min: 1, max: 200, step: 1, value: 100, fmt: v => String(v) }, v => { S.totalNuclei = v; resetScene(); });
ui.slider(gf, 'Neutrons fired', { min: 1, max: 40, step: 1, value: 1, fmt: v => String(v) }, v => S.neutronCount = v);
ui.buttons(gf, [
  { label: '⚛ Fire neutrons into the fuel', primary: true, onClick: fireNeutron },
  { label: '⟲ Reset', onClick: resetScene }
]);

const gu = ui.group('Fusion');
ui.buttons(gu, [{ label: '☀ Force D + T together', primary: true, onClick: forceFusion }]);

function showModeGroups() {
  gf.style.display = S.mode === 'fission' ? '' : 'none';
  gu.style.display = S.mode === 'fusion' ? '' : 'none';
}
showModeGroups();

const gv = ui.group('Show / hide');
ui.toggle(gv, 'Labels', true, v => S.labels = v);
ui.toggle(gv, 'Energy released bar', true, v => S.showEnergyBar = v);

const gr = ui.group('Readings');
const roEvents = ui.readout(gr, 'Reactions so far', '0');
const roNeutrons = ui.readout(gr, 'Free neutrons', '0');

const foot = ui.footer('');
ui.hint('Drag to rotate · shift+drag to pan · scroll / pinch to zoom');

const { canvas, ctx, W, H } = SimCanvas();
const eng = Engine3D(canvas, { dist: 13, yaw: 0.5, pitch: 0.32 });

/* --- nucleon clusters ---------------------------------------------------
   A nucleus is drawn as a raspberry-blob of proton (red) / neutron (grey)
   spheres. Offsets are generated once per nucleus and reused every frame so
   the blob is stable; counts are representative, not literal (U-235 would
   be 235 spheres). */
const SMALL_ARRANGEMENTS = {
  2: [[-0.6, 0, 0], [0.6, 0, 0]],
  3: [[0, 0.66, 0], [-0.58, -0.36, 0.12], [0.58, -0.36, -0.12]],
  4: [[0.55, 0.55, 0.55], [0.55, -0.55, -0.55], [-0.55, 0.55, -0.55], [-0.55, -0.55, 0.55]]
};

function makeCluster(n, R, nProtons) {
  const rn = n <= 4 ? 0.24 : Math.max(0.17, R * 1.15 / Math.cbrt(n));
  const offs = [];
  if (n <= 4) {
    for (const o of SMALL_ARRANGEMENTS[n]) offs.push({ p: v3.mul(o, rn * 1.05), proton: false });
    for (let i = 0; i < nProtons; i++) offs[i].proton = true;
    return { offs, rn, R: rn * 1.9 };
  }
  let tries = 0;
  while (offs.length < n && tries < 6000) {
    tries++;
    const u = Math.random() * 2 - 1, a = Math.random() * Math.PI * 2;
    const rad = (R - rn * 0.8) * Math.cbrt(Math.random());
    const s = Math.sqrt(1 - u * u);
    const p = [rad * s * Math.cos(a), rad * u, rad * s * Math.sin(a)];
    if (offs.some(o => Math.hypot(p[0] - o.p[0], p[1] - o.p[1], p[2] - o.p[2]) < rn * 1.05)) continue;
    offs.push({ p, proton: false });
  }
  while (offs.length < n) {
    const u = Math.random() * 2 - 1, a = Math.random() * Math.PI * 2;
    const rad = (R - rn * 0.8) * Math.cbrt(Math.random());
    const s = Math.sqrt(1 - u * u);
    offs.push({ p: [rad * s * Math.cos(a), rad * u, rad * s * Math.sin(a)], proton: false });
  }
  const order = offs.map((_, i) => i).sort(() => Math.random() - 0.5);
  for (let i = 0; i < nProtons && i < order.length; i++) offs[order[i]].proton = true;
  return { offs, rn, R };
}

function rgba(hex, a) {
  return 'rgba(' + parseInt(hex.slice(1, 3), 16) + ',' + parseInt(hex.slice(3, 5), 16) + ',' +
    parseInt(hex.slice(5, 7), 16) + ',' + Math.max(0, a).toFixed(2) + ')';
}

/* One composite: every nucleon shares the cluster's depth (depthOverride),
   drawn back-to-front by each nucleon's own depth so the blob never flickers. */
function drawCluster(c, cluster, alpha) {
  const cd = eng.project(c).depth - cluster.R;
  const parts = [];
  for (const o of cluster.offs) {
    const wp = [c[0] + o.p[0], c[1] + o.p[1], c[2] + o.p[2]];
    parts.push({ wp, proton: o.proton, d: eng.project(wp).depth });
  }
  parts.sort((a, b) => b.d - a.d);
  for (const part of parts) {
    const col = part.proton ? PROTON_COL : NEUTRON_COL;
    if (alpha >= 1) {
      eng.sphere(part.wp, cluster.rn, col, { stroke: 'rgba(26,26,46,0.35)', strokeWidth: 1.2, depthOverride: cd });
    } else {
      eng.sphere(part.wp, cluster.rn, rgba(col, alpha), { highlight: rgba(lighten(col, 0.55), alpha), depthOverride: cd });
    }
  }
}

/* a chunk of fuel: a single hexagonal-close-packed sheet — rows are offset by
   half a spacing so neighbours touch. NUC_R/LATTICE_S size the individual
   nuclei and their spacing; everything else (fragment size, hit radius) is
   scaled off NUC_R via SCALE so the whole picture stays proportional. */
const NUC_R = 0.55, LATTICE_S = 1.3, SCALE = NUC_R / 0.8;
/* limit: stop as soon as this many points exist, then centre just that subset
   (not the full cols x rows sheet) — so a small `limit` (down to a single
   nucleus) stays centred on itself rather than sitting off in a corner of
   the full sheet's centroid. */
function buildLatticeBlock(cols, rows, s, limit) {
  const rowDx = s / 2, rowDz = s * Math.sqrt(3) / 2;
  const pts = [];
  outer:
  for (let j = 0; j < rows; j++) {
    for (let i = 0; i < cols; i++) {
      pts.push([i * s + (j % 2) * rowDx, 0, j * rowDz]);
      if (limit && pts.length >= limit) break outer;
    }
  }
  const c = pts.reduce((a, p) => [a[0] + p[0], a[1] + p[1], a[2] + p[2]], [0, 0, 0]).map(v => v / pts.length);
  return pts.map(p => [p[0] - c[0], p[1] - c[1], p[2] - c[2]]);
}

let uraniumNuclei = [], freeNeutrons = [], fragments = [], flashes = [];
let reactionCount = 0, energyBarLevel = 0;

function resetScene() {
  uraniumNuclei = []; freeNeutrons = []; fragments = []; flashes = [];
  reactionCount = 0; energyBarLevel = 0;
  if (S.mode === 'fission') {
    const side = Math.max(1, Math.ceil(Math.sqrt(S.totalNuclei)));
    S.gridSide = side;
    eng.cam.dist = Math.max(8, 3 * side);
    const positions = buildLatticeBlock(side, side, LATTICE_S, S.totalNuclei);
    for (const p of positions) uraniumNuclei.push({ x: p[0], y: p[1], z: p[2], alive: true, cluster: makeCluster(16, NUC_R, 6) });
  } else {
    eng.cam.dist = 13;
    fragments = [
      { type: 'D', label: 'D', labelCol: D_COL, cluster: makeCluster(2, 0, 1), x: -2.2, y: 0, z: 0, vx: 0.55, vy: 0, vz: 0 },
      { type: 'T', label: 'T', labelCol: T_COL, cluster: makeCluster(3, 0, 1), x: 2.2, y: 0, z: 0, vx: -0.55, vy: 0, vz: 0 }
    ];
  }
}
resetScene();

/* a thin beam straight through the middle of the stack, plus a few strays at
   random angles — the beam alone would only ever touch nuclei on its central
   axis, so the strays are what eventually reach every nucleus over repeated
   firings */
function fireNeutron() {
  if (S.mode !== 'fission') return;
  const alive = uraniumNuclei.filter(u => u.alive);
  if (!alive.length) return;
  const xs = alive.map(u => u.x), ys = alive.map(u => u.y), zs = alive.map(u => u.z);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  const zMin = Math.min(...zs), zMax = Math.max(...zs);
  const yMid = (yMin + yMax) / 2, zMid = (zMin + zMax) / 2;
  const gunX = xMin - 5;

  const BEAM_N = Math.max(1, Math.round(S.neutronCount * 0.7));
  const STRAY_N = Math.max(0, S.neutronCount - BEAM_N);
  const spreadY = Math.max(0.2, (yMax - yMin) * 0.12), spreadZ = Math.max(0.2, (zMax - zMin) * 0.12);
  for (let i = 0; i < BEAM_N; i++) {
    const ty = yMid + (Math.random() * 2 - 1) * spreadY, tz = zMid + (Math.random() * 2 - 1) * spreadZ;
    const start = [gunX, ty, tz];
    const v = v3.mul(v3.norm(v3.sub([xMax, ty, tz], start)), 3.6 + Math.random() * 1.2);
    freeNeutrons.push({ x: start[0], y: start[1], z: start[2], vx: v[0], vy: v[1], vz: v[2], seed: true });
  }

  for (let i = 0; i < STRAY_N; i++) {
    const tgt = [xMin + Math.random() * (xMax - xMin), yMin + Math.random() * (yMax - yMin), zMin + Math.random() * (zMax - zMin)];
    const start = [gunX, yMin + Math.random() * (yMax - yMin), zMin + Math.random() * (zMax - zMin)];
    const v = v3.mul(v3.norm(v3.sub(tgt, start)), 3.2 + Math.random() * 1.6);
    freeNeutrons.push({ x: start[0], y: start[1], z: start[2], vx: v[0], vy: v[1], vz: v[2], seed: true });
  }
}

function splitNucleus(u) {
  u.alive = false;
  reactionCount++;
  energyBarLevel = Math.min(1, energyBarLevel + 0.25);
  flashes.push({ x: u.x, y: u.y, z: u.z, life: 0.4, maxLife: 0.4 });
  // two daughter nuclei fly apart — the heavier Ba-144 recoils slower than Kr-89
  const a = Math.random() * Math.PI * 2;
  fragments.push({ type: 'frag', label: 'Ba-144', labelCol: '#475569', cluster: makeCluster(20, 0.68 * SCALE, 8),
    x: u.x, y: u.y, z: u.z, bx: u.x, by: u.y, bz: u.z, vx: Math.cos(a) * 1.0, vy: 0.15, vz: Math.sin(a) * 1.0 });
  fragments.push({ type: 'frag', label: 'Kr-89', labelCol: '#475569', cluster: makeCluster(14, 0.58 * SCALE, 6),
    x: u.x, y: u.y, z: u.z, bx: u.x, by: u.y, bz: u.z, vx: -Math.cos(a) * 1.6, vy: -0.15, vz: -Math.sin(a) * 1.6 });
  // 2-3 new free neutrons
  const nOut = 2 + Math.floor(Math.random() * 2);
  for (let i = 0; i < nOut; i++) {
    const na = Math.random() * Math.PI * 2, nz = (Math.random() - 0.5) * 2;
    freeNeutrons.push({ x: u.x, y: u.y, z: u.z, vx: Math.cos(na) * 2.2, vy: nz * 0.6, vz: Math.sin(na) * 2.2 });
  }
}

let fusionCooldown = 0;
function forceFusion() {
  if (S.mode !== 'fusion' || fusionCooldown > 0) return;
  const d = fragments.find(f => f.type === 'D'), t = fragments.find(f => f.type === 'T');
  if (!d || !t) return;
  d.vx = 1.8; t.vx = -1.8;
  fusionCooldown = 2;
}

let simT = 0, lastT = 0;
function frame(tms) {
  const t = tms / 1000, dt = Math.min(t - lastT, 0.04); lastT = t; simT += dt;
  if (fusionCooldown > 0) fusionCooldown -= dt;

  ctx.clearRect(0, 0, W(), H());
  eng.begin(W(), H());

  for (let g = -5; g <= 5.01; g += 2.5) {
    eng.line([[g, -2.6, -5], [g, -2.6, 5]], { color: '#eef2f7', width: 1.5 });
    eng.line([[-5, -2.6, g], [5, -2.6, g]], { color: '#eef2f7', width: 1.5 });
  }

  if (S.mode === 'fission') {
    uraniumNuclei.forEach((u, i) => {
      if (!u.alive) return;
      drawCluster([u.x, u.y, u.z], u.cluster, 1);
      // only tag one nucleus by name — with dozens packed together, labelling
      // every one would just be a wall of overlapping text
      if (S.labels && i === 0) eng.label([u.x, u.y + 1.15, u.z], 'U-235', { color: U_COL, size: 14, lift: 2 });
    });
    for (let i = freeNeutrons.length - 1; i >= 0; i--) {
      const nn = freeNeutrons[i];
      nn.x += nn.vx * dt; nn.y += nn.vy * dt; nn.z += nn.vz * dt;
      let hit = null;
      for (const u of uraniumNuclei) {
        if (!u.alive) continue;
        if (Math.hypot(nn.x - u.x, nn.y - u.y, nn.z - u.z) < 0.62) { hit = u; break; }
      }
      if (hit && (S.chainReaction || nn.seed)) { splitNucleus(hit); freeNeutrons.splice(i, 1); continue; }
      eng.sphere([nn.x, nn.y, nn.z], 0.15, NEUTRON_COL, { stroke: 'rgba(26,26,46,0.35)', strokeWidth: 1.2 });
      if (Math.abs(nn.x) > 24 || Math.abs(nn.y) > 10 || Math.abs(nn.z) > 20) freeNeutrons.splice(i, 1);
    }
    for (let i = fragments.length - 1; i >= 0; i--) {
      const f = fragments[i];
      f.x += f.vx * dt; f.y += f.vy * dt; f.z += f.vz * dt;
      // fade out once a fragment has travelled a bit from the nucleus it was
      // born from (not from the world origin — the block is huge now, so a
      // fragment born near the edge would otherwise vanish instantly)
      const traveled = Math.hypot(f.x - f.bx, f.y - f.by, f.z - f.bz);
      const alpha = Math.min(1, (3.2 - traveled) / 1.4);
      if (alpha <= 0) { fragments.splice(i, 1); continue; }
      drawCluster([f.x, f.y, f.z], f.cluster, alpha);
      if (S.labels && alpha > 0.5) eng.label([f.x, f.y + f.cluster.R + 0.4, f.z], f.label, { color: f.labelCol, size: 13, lift: 2 });
    }
    for (let i = flashes.length - 1; i >= 0; i--) {
      const fl = flashes[i]; fl.life -= dt;
      const a = Math.max(0, fl.life / fl.maxLife);
      eng.sphere([fl.x, fl.y, fl.z], (0.8 + (1 - a) * 1.2) * SCALE, 'rgba(250,204,21,' + (a * 0.5).toFixed(2) + ')', { highlight: 'rgba(254,240,138,0.6)' });
      if (fl.life <= 0) flashes.splice(i, 1);
    }
    if (S.labels && uraniumNuclei.some(u => u.alive)) eng.label([0, -1.8, S.gridSide * 0.75], 'U-235 nuclei (a slice of the fuel) — protons red, neutrons grey', { color: '#475569', size: 14, lift: 2 });
  } else {
    const d = fragments.find(f => f.type === 'D'), tt = fragments.find(f => f.type === 'T');
    if (d && tt) {
      d.x += d.vx * dt; tt.x += tt.vx * dt;
      const dist = Math.abs(d.x - tt.x);
      if (dist < 0.9 && Math.abs(d.vx) > 0.1) {
        // fuse!
        reactionCount++;
        energyBarLevel = Math.min(1, energyBarLevel + 0.08);
        flashes.push({ x: (d.x + tt.x) / 2, y: 0, z: 0, life: 0.5, maxLife: 0.5 });
        fragments = fragments.filter(f => f.type !== 'D' && f.type !== 'T');
        // the fast neutron carries ~80% of the energy; He-4 recoils the other way
        fragments.push({ type: 'He', label: 'He-4', labelCol: HE_COL, cluster: makeCluster(4, 0, 2), x: 0, y: 0, z: 0, vx: 0.9, vy: 0, vz: 0 });
        freeNeutrons.push({ x: 0, y: -0.1, z: 0, vx: -3.5, vy: 0, vz: 0.4 });
        setTimeout(resetScene, 1600);
      }
    }
    for (const f of fragments) {
      if (f.type === 'He') { f.x += f.vx * dt; f.y += f.vy * dt; }
      drawCluster([f.x, f.y, f.z], f.cluster, 1);
      if (S.labels) eng.label([f.x, f.y + 0.85, f.z], f.label, { color: f.labelCol, size: 15, lift: 2 });
    }
    for (let i = freeNeutrons.length - 1; i >= 0; i--) {
      const nn = freeNeutrons[i];
      nn.x += nn.vx * dt; nn.z += nn.vz * dt;
      eng.sphere([nn.x, nn.y, nn.z], 0.22, NEUTRON_COL, { stroke: 'rgba(26,26,46,0.35)', strokeWidth: 1.2 });
      if (Math.abs(nn.x) > 8) freeNeutrons.splice(i, 1);
    }
    for (let i = flashes.length - 1; i >= 0; i--) {
      const fl = flashes[i]; fl.life -= dt;
      const a = Math.max(0, fl.life / fl.maxLife);
      eng.sphere([fl.x, fl.y, fl.z], 0.5 + (1 - a) * 1.6, 'rgba(250,204,21,' + (a * 0.55).toFixed(2) + ')', { highlight: 'rgba(254,240,138,0.6)' });
      if (fl.life <= 0) flashes.splice(i, 1);
    }
    if (S.labels) eng.label([0, -1.6, 0], 'push the D and T together — real fusion needs extreme heat & pressure to beat their repulsion', { color: '#475569', size: 14, lift: 2 });
  }

  energyBarLevel = Math.max(0, energyBarLevel - dt * 0.06);

  eng.flush(ctx);
  if (S.showEnergyBar) drawEnergyBar();

  roEvents.set(String(reactionCount));
  roNeutrons.set(String(freeNeutrons.length));

  if (S.mode === 'fission') {
    foot.set('<b>Fission:</b> a neutron splits a heavy U-235 nucleus into two smaller nuclei (e.g. Ba-144 + Kr-89) + 2&ndash;3 free neutrons + energy (&asymp;200 MeV). ' +
      (S.chainReaction ? 'Those neutrons can split <b>more</b> nuclei &mdash; a chain reaction.' : 'Chain reaction off: extra neutrons just fly past.'));
  } else {
    foot.set('<b>Fusion:</b> deuterium (D) + tritium (T) &rarr; helium-4 + a fast neutron (which carries ~80% of the energy). ' +
      'One fission releases more energy than one fusion (&asymp;200 MeV vs &asymp;18 MeV), but <b>per kilogram of fuel, fusion releases several times more</b> &mdash; it powers the Sun, and fusion reactors are trying to harness it on Earth.');
  }

  requestAnimationFrame(frame);
}

function drawEnergyBar() {
  const bw = 46, bh = 200, bx = 50, by = H() - bh - 150;
  ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.strokeStyle = INK; ctx.lineWidth = 3;
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(bx - 10, by - 34, bw + 20, bh + 44, 10); else ctx.rect(bx - 10, by - 34, bw + 20, bh + 44);
  ctx.fill(); ctx.stroke();
  Draw.label(ctx, 'Energy', bx + bw / 2, by - 18, { size: 13, color: '#475569' });
  ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 2; ctx.strokeRect(bx, by, bw, bh);
  const fillH = bh * energyBarLevel;
  ctx.fillStyle = ENERGY_COL;
  ctx.fillRect(bx, by + bh - fillH, bw, fillH);
  ctx.strokeStyle = INK; ctx.lineWidth = 2.5; ctx.strokeRect(bx, by, bw, bh);
}

window.BOOT_DONE = true;
requestAnimationFrame(frame);
</script>
</body>
</html>
